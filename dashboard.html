            },

    }
}
</script>
<style>
    body { font-family: 'Cairo', sans-serif; background-color: #F5F6F8; }
    .islamic-pattern {
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9A23A' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .stat-card { transition: all 0.3s ease; }
    .stat-card:hover { transform: translateY(-4px); }
    .fade-in { animation: fadeIn 0.5s ease both; }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .progress-ring { transition: stroke-dashoffset 0.8s ease; }
    .empty-state { animation: floaty 3s ease-in-out infinite; }
    @keyframes floaty {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
    }
    .menu-item { transition: all 0.2s ease; }
    .menu-item:hover { background: #f3f3f4; }

    /* Status pills */
    .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
    }
    .status-pill.present { background: #d4f5dd; color: #1E7D45; }
    .status-pill.absent { background: #ffdad6; color: #BA1A1A; }
    .status-pill.late { background: #ffedd5; color: #E67E22; }
    .status-pill.excused { background: #fef3c7; color: #B45309; }

    /* Analysis bar */
    .analysis-bar {
        display: flex;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: #e2e2e2;
    }
    .analysis-bar > div { transition: width 0.8s ease; }

    /* Legend dot */
    .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
    }
</style>

<!-- Main Content -->
<main class="flex-1 flex flex-col w-full max-w-5xl mx-auto px-4 md:px-8 py-6 min-h-screen" id="mainContent">
    <!-- Content will be injected here -->

<nav class="md:hidden bg-surface-container flex justify-around items-center px-2 py-2 rounded-t-xl border-t border-outline-variant shadow-lg fixed bottom-0 left-0 w-full z-50">
    <a class="flex flex-col items-center justify-center text-secondary font-bold scale-95 w-16 h-14" href="dashboard.html">
        <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">home</span>

    <a class="flex flex-col items-center justify-center text-on-surface-variant w-16 h-14" href="attendance.html">

    <a class="flex flex-col items-center justify-center text-on-surface-variant w-16 h-14" href="students.html">
        <span class="material-symbols-outlined mb-1">group</span>

    <a class="flex flex-col items-center justify-center text-on-surface-variant w-16 h-14" href="reports.html">

<script>
(function () {
    const WALLETS_KEY = 'masjid_alhadi_wallets';
    const STUDENTS_PREFIX = 'masjid_alhadi_students_';
    const ATTENDANCE_PREFIX = 'masjid_alhadi_attendance_';
    const ACTIVE_WALLET_KEY = 'masjid_alhadi_active_wallet';

    const mainContent = document.getElementById('mainContent');
    const headerTitle = document.getElementById('headerTitle');
    const headerSubtitle = document.getElementById('headerSubtitle');
    const sideName = document.getElementById('sideName');

    // ---- Storage helpers ----
    function getActiveWallet() {
        try {
            const wallets = JSON.parse(localStorage.getItem(WALLETS_KEY) || '[]');
            if (wallets.length === 0) return null;
            const activeId = localStorage.getItem(ACTIVE_WALLET_KEY);
            if (activeId) {
                const found = wallets.find(w => String(w.id) === String(activeId));
                if (found) return found;
            }
            const last = wallets[wallets.length - 1];
            localStorage.setItem(ACTIVE_WALLET_KEY, last.id);
            return last;
        } catch (e) { return null; }
    }

    function getStudents(walletId) {
        try {
            const raw = localStorage.getItem(STUDENTS_PREFIX + walletId);
            return raw ? JSON.parse(raw) : [];
        } catch (e) { return []; }
    }

    function getAttendance(walletId) {
        try {
            const raw = localStorage.getItem(ATTENDANCE_PREFIX + walletId);
            return raw ? JSON.parse(raw) : [];
        } catch (e) { return []; }
    }

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function getInitials(name) {
        const parts = (name || '').trim().split(/\s+/);
        if (parts.length >= 2) return parts[0][0] + parts[1][0];
        return parts[0][0] || '?';
    }

    function formatArabicDate(isoDate) {
        const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
        const days = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
        const d = new Date(isoDate + 'T00:00:00');
        return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    }

    function formatShortDate(isoDate) {
        const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
        const d = new Date(isoDate + 'T00:00:00');
        return `${d.getDate()} ${months[d.getMonth()]}`;
    }

    function getTodayISO() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    // Count session stats (returns {present, absent, late, excused, total, marked})
    function countSessionStats(records) {
        let present = 0, absent = 0, late = 0, excused = 0;
        if (records) {
            Object.values(records).forEach(status => {
                if (status === 'present') present++;
                else if (status === 'absent') absent++;
                else if (status === 'late') late++;
                else if (status === 'excused') excused++;
            });
        }
        return {
            present, absent, late, excused,
            marked: present + absent + late + excused,
            // Attendance rate: present + late counts as attended; excused is neutral
            attendancePct: (present + absent + late + excused) > 0
                ? Math.round(((present + late) / (present + absent + late + excused)) * 100)
                : 0
        };
    }

    // ---- Render ----
    function render() {
        const wallet = getActiveWallet();

        if (!wallet) {
            renderNoWallet();
            return;
        }

        headerSubtitle.textContent = `محفظ: ${wallet.name}`;
        sideName.textContent = wallet.name;

        const students = getStudents(wallet.id);
        const attendance = getAttendance(wallet.id);
        const today = getTodayISO();

        // Today's attendance
        const todaySession = attendance.find(a => a.date === today);
        let todayStats = { present: 0, absent: 0, late: 0, excused: 0, marked: 0, attendancePct: 0 };
        let todayRecords = [];

        if (todaySession && todaySession.records) {
            todayStats = countSessionStats(todaySession.records);
            todayRecords = students
                .filter(s => todaySession.records[s.id] !== undefined)
                .map(s => ({ student: s, status: todaySession.records[s.id] }));
        }

        const unmarkedToday = todaySession ? 0 : students.length;

        // Stats
        const totalStudents = students.length;
        const totalSessions = attendance.length;

        // Overall analytics across all sessions
        const overallStats = computeOverallStats(attendance, students);

        // Recent sessions (last 5)
        const recentSessions = attendance
            .slice()
            .sort((a, b) => b.date.localeCompare(a.date))
            .slice(0, 5);

        // Recent students (last 5)
        const recentStudents = students
            .slice()
            .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))
            .slice(0, 5);

        mainContent.innerHTML = `
            <!-- Welcome Section -->
            <section class="mb-6 md:mb-8 text-center md:text-right flex flex-col items-center md:items-start fade-in">
                <div class="inline-flex items-center justify-center p-3 rounded-full bg-surface-container shadow-sm border border-outline-variant mb-4 md:hidden">
                    <span class="material-symbols-outlined text-secondary text-3xl">mosque</span>
                </div>
                <h2 class="text-headline-lg md:text-headline-xl text-primary mb-1">السلام عليكم</h2>
                <h3 class="text-headline-md text-primary font-bold mb-2">${escapeHtml(wallet.name)}</h3>
                <p class="text-body-md text-secondary bg-secondary/10 inline-block px-3 py-1 rounded-full border border-secondary/20">${formatArabicDate(today)}</p>
            </section>

            ${totalStudents === 0 ? renderEmptyState() : `
            <!-- Stats Grid -->
            <section class="mb-6 fade-in" style="animation-delay: 0.1s">
                <div class="flex items-center justify-between mb-4">
                    <h4 class="text-headline-md text-primary font-bold">إحصائيات سريعة</h4>
                    <span class="text-xs text-on-surface-variant bg-surface-container px-2 py-1 rounded-full">اليوم</span>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                    ${renderStatCard('group', 'عدد الطلبة', totalStudents, 'primary', 'bg-primary/10')}
                    ${renderStatCard('how_to_reg', 'حاضر اليوم', todayStats.present, 'success', 'bg-success/10')}
                    ${renderStatCard('person_off', 'غائب اليوم', todayStats.absent + unmarkedToday, 'error', 'bg-error/10')}
                    ${renderStatCard('event_available', 'جلسات الحضور', totalSessions, 'secondary', 'bg-secondary/10')}
                </div>
            </section>

            <!-- Today's Detailed Breakdown (includes late & excused) -->
            ${todaySession ? renderTodayBreakdown(todayStats, unmarkedToday, totalStudents) : ''}

            <!-- Overall Analytics (across all sessions) -->
            ${totalSessions > 0 ? renderOverallAnalytics(overallStats, totalStudents) : ''}

            <!-- Primary Actions -->
            <section class="flex flex-col gap-3 mb-8 fade-in" style="animation-delay: 0.2s">
                <button onclick="location.href='attendance.html'" class="w-full bg-primary text-on-primary py-4 rounded-xl flex items-center justify-center gap-3 shadow-md hover:shadow-lg transition-all active:scale-95 duration-200">
                    <span class="material-symbols-outlined text-[24px]">${todaySession ? 'edit_calendar' : 'calendar_today'}</span>
                    <span class="text-body-lg font-bold">${todaySession ? 'تعديل حضور اليوم' : 'أخذ الحضور اليوم'}</span>
                </button>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    ${renderActionButton('group', 'الطلبة', 'students.html')}
                    ${renderActionButton('analytics', 'التقارير', 'reports.html')}
                </div>
            </section>

            <!-- Two columns: Recent sessions + Recent students -->
            <section class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 fade-in" style="animation-delay: 0.3s">
                ${renderRecentSessions(recentSessions, students)}
                ${renderRecentStudents(recentStudents)}
            </section>
            `}
        `;
    }

    // Compute overall stats across all attendance sessions
    function computeOverallStats(attendance, students) {
        let totalPresent = 0, totalAbsent = 0, totalLate = 0, totalExcused = 0;
        let totalMarked = 0;

        // Per-student counters
        const perStudent = {};
        students.forEach(s => {
            perStudent[s.id] = { present: 0, absent: 0, late: 0, excused: 0, total: 0 };
        });

        attendance.forEach(session => {
            if (!session.records) return;
            Object.entries(session.records).forEach(([sid, status]) => {
                if (status === 'present') { totalPresent++; if (perStudent[sid]) perStudent[sid].present++; }
                else if (status === 'absent') { totalAbsent++; if (perStudent[sid]) perStudent[sid].absent++; }
                else if (status === 'late') { totalLate++; if (perStudent[sid]) perStudent[sid].late++; }
                else if (status === 'excused') { totalExcused++; if (perStudent[sid]) perStudent[sid].excused++; }
                totalMarked++;
                if (perStudent[sid]) perStudent[sid].total++;
            });
        });

        const overallPct = totalMarked > 0 ? Math.round(((totalPresent + totalLate) / totalMarked) * 100) : 0;

        // Top students by attendance
        const topStudents = Object.entries(perStudent)
            .filter(([_, data]) => data.total > 0)
            .map(([sid, data]) => {
                const student = students.find(s => String(s.id) === String(sid));
                const pct = data.total > 0 ? Math.round(((data.present + data.late) / data.total) * 100) : 0;
                return { student, ...data, pct };
            })
            .sort((a, b) => b.pct - a.pct || b.total - a.total)
            .slice(0, 5);

        // Students with most absences
        const mostAbsent = Object.entries(perStudent)
            .filter(([_, data]) => data.absent > 0)
            .map(([sid, data]) => {
                const student = students.find(s => String(s.id) === String(sid));
                return { student, ...data };
            })
            .sort((a, b) => b.absent - a.absent)
            .slice(0, 5);

        // Students with most late arrivals
        const mostLate = Object.entries(perStudent)
            .filter(([_, data]) => data.late > 0)
            .map(([sid, data]) => {
                const student = students.find(s => String(s.id) === String(sid));
                return { student, ...data };
            })
            .sort((a, b) => b.late - a.late)
            .slice(0, 5);

        // Students with most excuses
        const mostExcused = Object.entries(perStudent)
            .filter(([_, data]) => data.excused > 0)
            .map(([sid, data]) => {
                const student = students.find(s => String(s.id) === String(sid));
                return { student, ...data };
            })
            .sort((a, b) => b.excused - a.excused)
            .slice(0, 5);

        return {
            totalPresent, totalAbsent, totalLate, totalExcused, totalMarked, overallPct,
            topStudents, mostAbsent, mostLate, mostExcused
        };
    }

    function renderStatCard(icon, label, value, color, bgClass) {
        return `
            <div class="stat-card bg-surface-container rounded-xl p-4 shadow-sm border-t-2 border-t-${color} flex flex-col items-center justify-center relative overflow-hidden">
                <div class="w-10 h-10 rounded-full ${bgClass} flex items-center justify-center text-${color} mb-2">
                    <span class="material-symbols-outlined">${icon}</span>
                </div>
                <span class="text-headline-lg text-primary font-bold">${value}</span>
                <span class="text-label-bold text-on-surface-variant mt-1 text-center">${label}</span>
            </div>
        `;
    }

    // Today's detailed breakdown — includes late & excused
    function renderTodayBreakdown(stats, unmarked, total) {
        const circumference = 2 * Math.PI * 36;
        const pct = stats.attendancePct;
        const offset = circumference - (pct / 100) * circumference;

        return `
            <section class="mb-6 fade-in" style="animation-delay: 0.15s">
                <div class="bg-surface-container rounded-2xl p-5 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <h4 class="text-headline-md text-primary font-bold flex items-center gap-2">
                            <span class="material-symbols-outlined text-secondary">today</span>
                            تفاصيل حضور اليوم
                        </h4>
                        <span class="text-xs bg-primary/10 text-primary px-2 py-1 rounded-full font-bold">${stats.marked}/${total} مسجَّل</span>
                    </div>

                    <div class="flex items-center gap-5">
                        <!-- Progress ring -->
                        <div class="relative flex-shrink-0">
                            <svg width="110" height="110" class="-rotate-90">
                                <circle cx="55" cy="55" r="42" stroke="#e2e2e2" stroke-width="8" fill="none"/>
                                <circle cx="55" cy="55" r="42" stroke="#1E7D45" stroke-width="8" fill="none"
                                    stroke-dasharray="${2 * Math.PI * 42}"
                                    stroke-dashoffset="${2 * Math.PI * 42 - (pct / 100) * 2 * Math.PI * 42}"
                                    stroke-linecap="round"
                                    class="progress-ring"/>
                            </svg>
                            <div class="absolute inset-0 flex flex-col items-center justify-center">
                                <span class="text-headline-md text-primary font-bold">${pct}%</span>
                                <span class="text-[10px] text-on-surface-variant">حضور</span>
                            </div>
                        </div>

                        <!-- Legend -->
                        <div class="flex-1 space-y-2">
                            <div class="flex items-center justify-between text-sm">
                                <span class="flex items-center gap-2 text-on-surface-variant">
                                    <span class="legend-dot bg-success"></span>
                                    حاضر
                                </span>
                                <span class="font-bold text-success">${stats.present}</span>
                            </div>
                            <div class="flex items-center justify-between text-sm">
                                <span class="flex items-center gap-2 text-on-surface-variant">
                                    <span class="legend-dot bg-warning"></span>
                                    متأخر
                                </span>
                                <span class="font-bold text-warning">${stats.late}</span>
                            </div>
                            <div class="flex items-center justify-between text-sm">
                                <span class="flex items-center gap-2 text-on-surface-variant">
                                    <span class="legend-dot bg-secondary"></span>
                                    غائب بعذر
                                </span>
                                <span class="font-bold text-secondary">${stats.excused}</span>
                            </div>
                            <div class="flex items-center justify-between text-sm">
                                <span class="flex items-center gap-2 text-on-surface-variant">
                                    <span class="legend-dot bg-error"></span>
                                    غائب
                                </span>
                                <span class="font-bold text-error">${stats.absent}</span>
                            </div>
                            ${unmarked > 0 ? `
                            <div class="flex items-center justify-between text-sm pt-2 border-t border-outline-variant">
                                <span class="flex items-center gap-2 text-on-surface-variant">
                                    <span class="legend-dot bg-outline-variant"></span>
                                    لم يُسجَّل
                                </span>
                                <span class="font-bold text-on-surface-variant">${unmarked}</span>
                            </div>
                            ` : ''}
                        </div>
                    </div>

                    <!-- Visual bar -->
                    ${stats.marked > 0 ? `
                    <div class="mt-4 pt-4 border-t border-outline-variant">
                        <div class="analysis-bar">
                            ${stats.present > 0 ? `<div class="bg-success" style="width:${(stats.present/stats.marked)*100}%" title="حاضر"></div>` : ''}
                            ${stats.late > 0 ? `<div class="bg-warning" style="width:${(stats.late/stats.marked)*100}%" title="متأخر"></div>` : ''}
                            ${stats.excused > 0 ? `<div class="bg-secondary" style="width:${(stats.excused/stats.marked)*100}%" title="بعذر"></div>` : ''}
                            ${stats.absent > 0 ? `<div class="bg-error" style="width:${(stats.absent/stats.marked)*100}%" title="غائب"></div>` : ''}
                        </div>
                        <p class="text-[11px] text-on-surface-variant mt-2 text-center">
                            <span class="font-bold text-success">المتأخرون يُحتسبون حضوراً</span> • الغائبون بعذر يُسجلون بشكل منفصل
                        </p>
                    </div>
                    ` : ''}
                </div>
            </section>
        `;
    }

    // Overall analytics section
    function renderOverallAnalytics(overall, totalStudents) {
        const { totalPresent, totalAbsent, totalLate, totalExcused, totalMarked, overallPct, topStudents, mostAbsent, mostLate, mostExcused } = overall;

        return `
            <section class="mb-6 fade-in" style="animation-delay: 0.18s">
                <div class="bg-surface-container rounded-2xl p-5 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <h4 class="text-headline-md text-primary font-bold flex items-center gap-2">
                            <span class="material-symbols-outlined text-secondary">analytics</span>
                            تحليل شامل
                        </h4>
                        <span class="text-xs text-on-surface-variant bg-surface px-2 py-1 rounded-full">جميع الجلسات</span>
                    </div>

                    <!-- Overall stats grid -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                        <div class="bg-success/5 border border-success/20 rounded-xl p-3 text-center">
                            <div class="text-xl font-bold text-success">${totalPresent}</div>
                            <div class="text-[10px] text-on-surface-variant font-bold mt-0.5">إجمالي الحضور</div>
                        </div>
                        <div class="bg-warning/5 border border-warning/20 rounded-xl p-3 text-center">
                            <div class="text-xl font-bold text-warning">${totalLate}</div>
                            <div class="text-[10px] text-on-surface-variant font-bold mt-0.5">إجمالي التأخر</div>
                        </div>
                        <div class="bg-secondary/5 border border-secondary/20 rounded-xl p-3 text-center">
                            <div class="text-xl font-bold text-secondary">${totalExcused}</div>
                            <div class="text-[10px] text-on-surface-variant font-bold mt-0.5">إجمالي الغياب بعذر</div>
                        </div>
                        <div class="bg-error/5 border border-error/20 rounded-xl p-3 text-center">
                            <div class="text-xl font-bold text-error">${totalAbsent}</div>
                            <div class="text-[10px] text-on-surface-variant font-bold mt-0.5">إجمالي الغياب</div>
                        </div>
                    </div>

                    <!-- Overall progress bar -->
                    <div class="mb-4">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-bold text-on-surface-variant">متوسط نسبة الحضور العامة</span>
                            <span class="text-sm font-bold ${overallPct >= 70 ? 'text-success' : overallPct >= 40 ? 'text-secondary' : 'text-error'}">${overallPct}%</span>
                        </div>
                        <div class="analysis-bar">
                            ${totalPresent > 0 ? `<div class="bg-success" style="width:${(totalPresent/totalMarked)*100}%" title="حاضر"></div>` : ''}
                            ${totalLate > 0 ? `<div class="bg-warning" style="width:${(totalLate/totalMarked)*100}%" title="متأخر"></div>` : ''}
                            ${totalExcused > 0 ? `<div class="bg-secondary" style="width:${(totalExcused/totalMarked)*100}%" title="بعذر"></div>` : ''}
                            ${totalAbsent > 0 ? `<div class="bg-error" style="width:${(totalAbsent/totalMarked)*100}%" title="غائب"></div>` : ''}
                        </div>
                        <div class="flex flex-wrap gap-3 mt-2 text-[10px] text-on-surface-variant">
                            <span class="flex items-center gap-1"><span class="legend-dot bg-success" style="width:8px;height:8px"></span>حاضر</span>
                            <span class="flex items-center gap-1"><span class="legend-dot bg-warning" style="width:8px;height:8px"></span>متأخر</span>
                            <span class="flex items-center gap-1"><span class="legend-dot bg-secondary" style="width:8px;height:8px"></span>بعذر</span>
                            <span class="flex items-center gap-1"><span class="legend-dot bg-error" style="width:8px;height:8px"></span>غائب</span>
                        </div>
                    </div>

                    <!-- Insights grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        ${renderInsightList('star', 'الأكثر التزاماً', 'text-success', 'bg-success/5', topStudents, s => `<span class="text-xs font-bold text-success">${s.pct}%</span> <span class="text-[10px] text-on-surface-variant">(${s.present + s.late}/${s.total})</span>`)}
                        ${renderInsightList('schedule', 'الأكثر تأخراً', 'text-warning', 'bg-warning/5', mostLate, s => `<span class="text-xs font-bold text-warning">${s.late} مرة</span>`)}
                        ${renderInsightList('event_busy', 'الأكثر غياباً بعذر', 'text-secondary', 'bg-secondary/5', mostExcused, s => `<span class="text-xs font-bold text-secondary">${s.excused} مرة</span>`)}
                        ${renderInsightList('person_off', 'الأكثر غياباً', 'text-error', 'bg-error/5', mostAbsent, s => `<span class="text-xs font-bold text-error">${s.absent} مرة</span>`)}
                    </div>
                </div>
            </section>
        `;
    }

    function renderInsightList(icon, title, color, bgClass, items, renderExtra) {
        if (items.length === 0) {
            return `
                <div class="${bgClass} border border-outline-variant/60 rounded-xl p-3">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="material-symbols-outlined ${color} text-base">${icon}</span>
                        <h5 class="text-xs font-bold text-on-surface-variant">${title}</h5>
                    </div>
                    <p class="text-[11px] text-on-surface-variant/70 text-center py-2">لا توجد بيانات</p>
                </div>
            `;
        }

        const rows = items.map(item => {
            if (!item.student) return '';
            return `
                <div class="flex items-center justify-between py-1.5 border-b border-outline-variant/50 last:border-0">
                    <div class="flex items-center gap-2 min-w-0 flex-1">
                        <div class="w-7 h-7 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0">
                            <span class="text-primary font-bold text-[10px]">${escapeHtml(getInitials(item.student.name))}</span>
                        </div>
                        <span class="text-xs font-semibold text-primary truncate">${escapeHtml(item.student.name)}</span>
                    </div>
                    ${renderExtra(item)}
                </div>
            `;
        }).join('');

        return `
            <div class="${bgClass} border border-outline-variant/60 rounded-xl p-3">
                <div class="flex items-center gap-2 mb-2">
                    <span class="material-symbols-outlined ${color} text-base">${icon}</span>
                    <h5 class="text-xs font-bold text-on-surface-variant">${title}</h5>
                </div>
                <div>${rows}</div>
            </div>
        `;
    }

    function renderActionButton(icon, label, href) {
        return `
            <button onclick="location.href='${href}'" class="w-full bg-surface-container text-primary border border-outline-variant py-4 px-5 rounded-xl flex items-center justify-between shadow-sm hover:border-outline hover:bg-surface-container-low transition-all group">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-secondary group-hover:scale-110 transition-transform">${icon}</span>
                    <span class="text-body-lg font-semibold">${label}</span>
                </div>
                <span class="material-symbols-outlined text-outline-variant rtl:-scale-x-100">arrow_forward_ios</span>
            </button>
        `;
    }

    function renderRecentSessions(sessions, students) {
        if (sessions.length === 0) {
            return `
                <div class="bg-surface-container rounded-2xl p-5 shadow-sm">
                    <div class="flex items-center justify-between mb-3">
                        <h4 class="text-headline-md text-primary font-bold flex items-center gap-2">
                            <span class="material-symbols-outlined text-secondary">event_note</span>
                            آخر الجلسات
                        </h4>
                    </div>
                    <div class="text-center py-6">
                        <span class="material-symbols-outlined text-4xl text-outline-variant">event_busy</span>
                        <p class="text-body-md text-on-surface-variant mt-2">لا توجد جلسات حضور بعد</p>
                        <button onclick="location.href='attendance.html'" class="mt-3 text-secondary text-sm font-bold hover:underline">ابدأ أول جلسة ←</button>
                    </div>
                </div>
            `;
        }

        const items = sessions.map(s => {
            const stats = countSessionStats(s.records);
            return `
                <div class="py-3 border-b border-outline-variant last:border-0">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
                                <span class="material-symbols-outlined text-primary">event</span>
                            </div>
                            <div>
                                <div class="text-body-md font-semibold text-primary">${formatShortDate(s.date)}</div>
                                <div class="text-xs text-on-surface-variant">${stats.marked} مسجَّل</div>
                            </div>
                        </div>
                        <span class="text-sm font-bold ${stats.attendancePct >= 70 ? 'text-success' : stats.attendancePct >= 40 ? 'text-secondary' : 'text-error'}">${stats.attendancePct}%</span>
                    </div>
                    <!-- Status pills -->
                    <div class="flex flex-wrap gap-1.5 pr-[52px]">
                        ${stats.present > 0 ? `<span class="status-pill present"><span class="material-symbols-outlined" style="font-size:12px">check_circle</span>${stats.present} حاضر</span>` : ''}
                        ${stats.late > 0 ? `<span class="status-pill late"><span class="material-symbols-outlined" style="font-size:12px">schedule</span>${stats.late} متأخر</span>` : ''}
                        ${stats.excused > 0 ? `<span class="status-pill excused"><span class="material-symbols-outlined" style="font-size:12px">event_available</span>${stats.excused} بعذر</span>` : ''}
                        ${stats.absent > 0 ? `<span class="status-pill absent"><span class="material-symbols-outlined" style="font-size:12px">cancel</span>${stats.absent} غائب</span>` : ''}
                    </div>
                </div>
            `;
        }).join('');

        return `
            <div class="bg-surface-container rounded-2xl p-5 shadow-sm">
                <div class="flex items-center justify-between mb-3">
                    <h4 class="text-headline-md text-primary font-bold flex items-center gap-2">
                        <span class="material-symbols-outlined text-secondary">event_note</span>
                        آخر الجلسات
                    </h4>
                    <button onclick="location.href='reports.html'" class="text-secondary text-xs font-bold hover:underline">عرض الكل</button>
                </div>
                <div>${items}</div>
            </div>
        `;
    }

    function renderRecentStudents(students) {
        if (students.length === 0) {
            return `
                <div class="bg-surface-container rounded-2xl p-5 shadow-sm">
                    <div class="flex items-center justify-between mb-3">
                        <h4 class="text-headline-md text-primary font-bold flex items-center gap-2">
                            <span class="material-symbols-outlined text-secondary">person_add</span>
                            أحدث الطلبة
                        </h4>
                    </div>
                    <div class="text-center py-6">
                        <span class="material-symbols-outlined text-4xl text-outline-variant">group_off</span>
                        <p class="text-body-md text-on-surface-variant mt-2">لا يوجد طلبة بعد</p>
                        <button onclick="location.href='students.html'" class="mt-3 text-secondary text-sm font-bold hover:underline">أضف طالباً ←</button>
                    </div>
                </div>
            `;
        }

        const items = students.map(s => `
            <div class="flex items-center justify-between py-2.5 border-b border-outline-variant last:border-0">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0">
                        <span class="text-primary font-bold text-xs">${escapeHtml(getInitials(s.name))}</span>
                    </div>
                    <div>
                        <div class="text-body-md font-semibold text-primary leading-tight">${escapeHtml(s.name)}</div>
                        ${s.level ? `<div class="text-xs text-on-surface-variant">${escapeHtml(s.level)}</div>` : ''}
                    </div>
                </div>
                <span class="material-symbols-outlined text-outline-variant rtl:-scale-x-100">arrow_forward_ios</span>
            </div>
        `).join('');

        return `
            <div class="bg-surface-container rounded-2xl p-5 shadow-sm">
                <div class="flex items-center justify-between mb-3">
                    <h4 class="text-headline-md text-primary font-bold flex items-center gap-2">
                        <span class="material-symbols-outlined text-secondary">person_add</span>
                        أحدث الطلبة
                    </h4>
                    <button onclick="location.href='students.html'" class="text-secondary text-xs font-bold hover:underline">عرض الكل</button>
                </div>
                <div>${items}</div>
            </div>
        `;
    }

    function renderEmptyState() {
        return `
            <section class="mb-8 fade-in">
                <div class="bg-surface-container rounded-2xl p-8 shadow-sm text-center">
                    <div class="empty-state inline-flex items-center justify-center w-24 h-24 rounded-full bg-secondary/10 mb-4">
                        <span class="material-symbols-outlined text-secondary text-5xl">school</span>
                    </div>
                    <h3 class="text-headline-md text-primary font-bold mb-2">ابدأ بإضافة طلبتك</h3>
                    <p class="text-body-md text-on-surface-variant mb-5 max-w-sm mx-auto">
                        لم تقم بإضافة أي طالب بعد. أضف طلبتك الآن لتتمكن من تسجيل الحضور ومتابعة التقدم.
                    </p>
                    <button onclick="location.href='students.html'" class="bg-secondary text-white px-6 py-3 rounded-xl font-bold shadow-md active:scale-95 transition-transform inline-flex items-center gap-2">
                        <span class="material-symbols-outlined">person_add</span>
                        إضافة طالب
                    </button>
                </div>
            </section>
        `;
    }

    function renderNoWallet() {
        headerSubtitle.textContent = 'غير مسجل';
        sideName.textContent = '—';
        mainContent.innerHTML = `
            <section class="flex-1 flex items-center justify-center fade-in">
                <div class="bg-surface-container rounded-2xl p-8 shadow-sm text-center max-w-md w-full">
                    <div class="empty-state inline-flex items-center justify-center w-24 h-24 rounded-full bg-error/10 mb-4">
                        <span class="material-symbols-outlined text-error text-5xl">warning</span>
                    </div>
                    <h3 class="text-headline-md text-primary font-bold mb-2">لا يوجد محفظ نشط</h3>
                    <p class="text-body-md text-on-surface-variant mb-5">
                        يرجى تسجيل الدخول كمحفظ أولاً لبدء استخدام التطبيق
                    </p>
                    <button onclick="location.href='index.html'" class="bg-secondary text-white px-6 py-3 rounded-xl font-bold shadow-md active:scale-95 transition-transform inline-flex items-center gap-2">
                        <span class="material-symbols-outlined">login</span>
                        تسجيل الدخول
                    </button>
                </div>
            </section>
        `;
    }

    // Initial render
    render();

    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) render();
    });

    window.addEventListener('storage', () => render());
})();
</script>
</body>
</html>
