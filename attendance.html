<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>تسجيل الحضور - مسجد الهدي النبوي</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            colors: {
                "primary": "#0B1D3A",
                "primary-container": "#0b1d3a",
                "on-primary": "#ffffff",
                "secondary": "#C9A23A",
                "secondary-container": "#fdd265",
                "on-secondary-container": "#755900",
                "surface": "#F5F6F8",
                "surface-container": "#FFFFFF",
                "surface-container-low": "#f3f3f4",
                "surface-container-highest": "#e2e2e2",
                "on-surface": "#1a1c1c",
                "on-surface-variant": "#44474d",
                "outline-variant": "#e2e2e2",
                "error": "#BA1A1A",
                "error-container": "#ffdad6",
                "success": "#1E7D45",
                "success-container": "#d4f5dd",
                "warning": "#E67E22",
            },
            fontFamily: {
                "body": ["Cairo", "sans-serif"],
            },
            fontSize: {
                "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
                "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                "headline-md": ["20px", { lineHeight: "28px", fontWeight: "700" }],
                "headline-lg": ["24px", { lineHeight: "32px", fontWeight: "700" }],
                "headline-xl": ["28px", { lineHeight: "36px", fontWeight: "800" }],
                "label-bold": ["12px", { lineHeight: "16px", fontWeight: "700" }],
            },
        }
    }
}
</script>
<style>
    body { font-family: 'Cairo', sans-serif; background-color: #F5F6F8; }
    .islamic-pattern {
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9A23A' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .fade-in { animation: fadeIn 0.4s ease both; }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .slide-up { animation: slideUp 0.3s ease both; }
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .menu-item { transition: all 0.2s ease; }
    .menu-item:hover { background: #f3f3f4; }

    /* Status toggle buttons */
    .status-btn {
        flex: 1;
        padding: 8px 6px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 700;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        background: #F5F6F8;
        color: #44474d;
        border: 1.5px solid transparent;
        transition: all 0.2s ease;
        cursor: pointer;
        user-select: none;
    }
    .status-btn .material-symbols-outlined { font-size: 18px; }
    .status-btn:hover { background: #e8eaed; }
    .status-btn.active-present {
        background: #d4f5dd;
        color: #1E7D45;
        border-color: #1E7D45;
        box-shadow: 0 2px 8px rgba(30,125,69,0.15);
    }
    .status-btn.active-absent {
        background: #ffdad6;
        color: #BA1A1A;
        border-color: #BA1A1A;
        box-shadow: 0 2px 8px rgba(186,26,26,0.15);
    }
    .status-btn.active-excused {
        background: #fef3c7;
        color: #B45309;
        border-color: #C9A23A;
        box-shadow: 0 2px 8px rgba(201,162,58,0.2);
    }
    .status-btn.active-late {
        background: #ffedd5;
        color: #E67E22;
        border-color: #E67E22;
        box-shadow: 0 2px 8px rgba(230,126,34,0.2);
    }

    /* Student row */
    .student-row {
        transition: all 0.2s ease;
    }
    .student-row.marked-present { border-right: 3px solid #1E7D45; }
    .student-row.marked-absent { border-right: 3px solid #BA1A1A; }
    .student-row.marked-excused { border-right: 3px solid #C9A23A; }
    .student-row.marked-late { border-right: 3px solid #E67E22; }

    /* Modal */
    .modal-backdrop {
        background: rgba(11, 29, 58, 0.5);
        backdrop-filter: blur(4px);
    }
    .modal-enter { animation: modalIn 0.25s ease-out; }
    @keyframes modalIn {
        from { opacity: 0; transform: translateY(20px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Toast */
    .toast {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #0B1D3A;
        color: #fff;
        padding: 12px 20px;
        border-radius: 16px;
        font-size: 14px;
        font-weight: 600;
        box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        opacity: 0;
        pointer-events: none;
        transition: opacity .25s, transform .25s;
        max-width: 90%;
        text-align: center;
        z-index: 999;
    }
    .toast.error { background: #BA1A1A; }
    .toast.success { background: #1E7D45; }
    .toast.warning { background: #E67E22; }
    .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }

    /* Date input */
    .date-input {
        background: #F5F6F8;
        border: 2px solid #e2e2e2;
        border-radius: 12px;
        padding: 12px 14px;
        font-family: 'Cairo', sans-serif;
        font-size: 15px;
        font-weight: 600;
        color: #0B1D3A;
        width: 100%;
        outline: none;
        transition: border-color .2s;
    }
    .date-input:focus { border-color: #0B1D3A; }
    .date-input.invalid { border-color: #BA1A1A; }

    /* Quick date chips */
    .quick-chip {
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        background: #F5F6F8;
        color: #44474d;
        cursor: pointer;
        transition: all .2s;
        white-space: nowrap;
        border: 1px solid transparent;
    }
    .quick-chip:hover { background: #e8eaed; }
    .quick-chip.active {
        background: #0B1D3A;
        color: #fff;
    }

    /* Scrollbar */
    .students-scroll::-webkit-scrollbar { width: 6px; }
    .students-scroll::-webkit-scrollbar-track { background: transparent; }
    .students-scroll::-webkit-scrollbar-thumb { background: #e2e2e2; border-radius: 3px; }

    /* Editing banner */
    .editing-banner {
        background: linear-gradient(135deg, #C9A23A 0%, #e0b84a 100%);
        color: #fff;
    }
</style>
</head>

<script>
(function () {
    const WALLETS_KEY = 'masjid_alhadi_wallets';
    const STUDENTS_PREFIX = 'masjid_alhadi_students_';
    const ATTENDANCE_PREFIX = 'masjid_alhadi_attendance_';
    const SESSIONS_PREFIX = 'masjid_alhadi_sessions_';
    const ACTIVE_WALLET_KEY = 'masjid_alhadi_active_wallet';

    const mainContent = document.getElementById('mainContent');
    const headerSubtitle = document.getElementById('headerSubtitle');
    const sideName = document.getElementById('sideName');

    const confirmModal = document.getElementById('confirmModal');
    const confirmIcon = document.getElementById('confirmIcon');
    const confirmTitle = document.getElementById('confirmTitle');
    const confirmMsg = document.getElementById('confirmMsg');
    const cancelConfirm = document.getElementById('cancelConfirm');
    const okConfirm = document.getElementById('okConfirm');

    const toast = document.getElementById('toast');

    let currentWalletId = null;
    let currentWalletName = '';
    let students = [];
    let attendance = [];
    let selectedDate = '';
    let sessionName = '';
    let records = {}; // { studentId: 'present'|'absent'|'excused'|'late' }
    let editingExistingId = null; // if editing existing record for this date
    let confirmCallback = null;

    // ---- Storage helpers ----
    function getActiveWallet() {
        try {
            const wallets = JSON.parse(localStorage.getItem(WALLETS_KEY) || '[]');
            if (wallets.length === 0) return null;
            const activeId = localStorage.getItem(ACTIVE_WALLET_KEY);
            if (activeId) {
                const found = wallets.find(w => String(w.id) === String(activeId));
                if (found) return found;
            }
            const last = wallets[wallets.length - 1];
            localStorage.setItem(ACTIVE_WALLET_KEY, last.id);
            return last;
        } catch (e) { return null; }
    }

    function getStudents(walletId) {
        try {
            const raw = localStorage.getItem(STUDENTS_PREFIX + walletId);
            return raw ? JSON.parse(raw) : [];
        } catch (e) { return []; }
    }

    function getAttendance(walletId) {
        try {
            const raw = localStorage.getItem(ATTENDANCE_PREFIX + walletId);
            return raw ? JSON.parse(raw) : [];
        } catch (e) { return []; }
    }

    function saveAttendance(walletId, list) {
        localStorage.setItem(ATTENDANCE_PREFIX + walletId, JSON.stringify(list));
    }

    function getSessions(walletId) {
        try {
            const raw = localStorage.getItem(SESSIONS_PREFIX + walletId);
            return raw ? JSON.parse(raw) : [];
        } catch (e) { return []; }
    }

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function getInitials(name) {
        const parts = (name || '').trim().split(/\s+/);
        if (parts.length >= 2) return parts[0][0] + parts[1][0];
        return parts[0][0] || '?';
    }

    function getTodayISO() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    function getYesterdayISO() {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    function getDaysAgo(n) {
        const d = new Date();
        d.setDate(d.getDate() - n);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    function formatArabicDate(isoDate) {
        if (!isoDate) return '';
        const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
        const days = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
        const d = new Date(isoDate + 'T00:00:00');
        if (isNaN(d.getTime())) return isoDate;
        return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    }

    function showToast(message, type) {
        toast.textContent = message;
        toast.className = 'toast show' + (type ? ' ' + type : '');
        setTimeout(() => toast.classList.remove('show'), 2800);
    }

    // ---- Find existing record for a date ----
    function findRecordForDate(date) {
        return attendance.find(a => a.date === date);
    }

    // ---- Load records for the selected date ----
    function loadRecordsForDate(date) {
        const existing = findRecordForDate(date);
        editingExistingId = existing ? existing.id : null;
        if (existing && existing.records) {
            records = { ...existing.records };
            sessionName = existing.sessionName || '';
        } else {
            records = {};
            sessionName = '';
        }
    }

    // ---- Stats computation ----
    function computeStats() {
        let present = 0, absent = 0, excused = 0, late = 0, unmarked = 0;
        students.forEach(s => {
            const st = records[String(s.id)];
            if (st === 'present') present++;
            else if (st === 'absent') absent++;
            else if (st === 'excused') excused++;
            else if (st === 'late') late++;
            else unmarked++;
        });
        const marked = present + absent + excused + late;
        const pct = marked > 0 ? Math.round(((present + late) / marked) * 100) : 0;
        return { present, absent, excused, late, unmarked, marked, total: students.length, pct };
    }

    // ---- Render ----
    function render() {
        const wallet = getActiveWallet();
        if (!wallet) {
            renderNoWallet();
            return;
        }
        currentWalletId = wallet.id;
        currentWalletName = wallet.name;
        headerSubtitle.textContent = `محفظ: ${wallet.name}`;
        sideName.textContent = wallet.name;

        students = getStudents(wallet.id);
        attendance = getAttendance(wallet.id);

        if (students.length === 0) {
            renderNoStudents();
            return;
        }

        // Default date = today
        selectedDate = selectedDate || getTodayISO();

        // Load records for the selected date (existing or empty)
        loadRecordsForDate(selectedDate);

        renderPage();
    }

    function renderPage() {
        const stats = computeStats();
        const existing = findRecordForDate(selectedDate);
        const isToday = selectedDate === getTodayISO();
        const isFuture = selectedDate > getTodayISO();
        const isEditing = !!existing;

        mainContent.innerHTML = `
            <!-- Page header -->
            <section class="mb-5 fade-in">
                <div class="flex items-center justify-between mb-3">
                    <div>
                        <h2 class="text-headline-lg text-primary font-bold flex items-center gap-2">
                            <span class="material-symbols-outlined text-secondary">event_available</span>
                            ${isEditing ? 'تعديل الحضور' : 'تسجيل الحضور'}
                        </h2>
                        <p class="text-body-md text-on-surface-variant mt-1">
                            ${isEditing ? 'يوجد سجل مسبق لهذا التاريخ — سيتم تحديثه' : 'اختر التاريخ وسجّل حضور الطلبة'}
                        </p>
                    </div>
                    <button onclick="location.href='dashboard.html'" class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center shadow-sm hover:bg-surface-container-low transition-colors">
                        <span class="material-symbols-outlined text-on-surface-variant">close</span>
                    </button>
                </div>
            </section>

            ${isEditing ? `
            <!-- Editing banner -->
            <section class="editing-banner rounded-2xl p-4 mb-4 flex items-center gap-3 shadow-sm fade-in" style="animation-delay: 0.02s">
                <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center flex-shrink-0">
                    <span class="material-symbols-outlined text-white">edit</span>
                </div>
                <div class="flex-1">
                    <h4 class="text-white font-bold text-sm">وضع التعديل</h4>
                    <p class="text-white/80 text-xs mt-0.5">سيتم تحديث سجل ${formatArabicDate(selectedDate)} الموجود مباشرة</p>
                </div>
                <span class="bg-white/20 text-white text-xs font-bold px-2 py-1 rounded-full">${stats.marked} مسجَّل</span>
            </section>
            ` : ''}

            <!-- Date picker card -->
            <section class="bg-surface-container rounded-2xl p-5 shadow-sm mb-4 fade-in" style="animation-delay: 0.05s">
                <label class="text-label-bold text-on-surface-variant mb-2 block">تاريخ الجلسة</label>
                <input type="date" id="dateInput" class="date-input" value="${selectedDate}" max="${getTodayISO()}"/>
                <div class="flex items-center justify-between mt-3">
                    <p class="text-sm text-primary font-bold" id="dateLabel">${formatArabicDate(selectedDate)}</p>
                    ${existing ? `<span class="text-xs bg-secondary/10 text-secondary px-2 py-1 rounded-full font-bold flex items-center gap-1"><span class="material-symbols-outlined text-xs">edit</span>سجل موجود</span>` : `<span class="text-xs bg-success/10 text-success px-2 py-1 rounded-full font-bold flex items-center gap-1"><span class="material-symbols-outlined text-xs">add_circle</span>سجل جديد</span>`}
                </div>

                <!-- Quick date chips -->
                <div class="flex gap-2 mt-3 overflow-x-auto pb-1">
                    <button class="quick-chip ${isToday ? 'active' : ''}" data-date="${getTodayISO()}">اليوم</button>
                    <button class="quick-chip ${selectedDate === getYesterdayISO() ? 'active' : ''}" data-date="${getYesterdayISO()}">أمس</button>
                    <button class="quick-chip ${selectedDate === getDaysAgo(2) ? 'active' : ''}" data-date="${getDaysAgo(2)}">قبل يومين</button>
                    <button class="quick-chip ${selectedDate === getDaysAgo(3) ? 'active' : ''}" data-date="${getDaysAgo(3)}">قبل 3 أيام</button>
                    <button class="quick-chip ${selectedDate === getDaysAgo(7) ? 'active' : ''}" data-date="${getDaysAgo(7)}">قبل أسبوع</button>
                </div>

                ${isFuture ? `
                <div class="mt-3 bg-error/10 border border-error/20 rounded-xl p-3 flex items-start gap-2">
                    <span class="material-symbols-outlined text-error text-lg">warning</span>
                    <p class="text-xs text-error font-semibold">لا يمكن تسجيل حضور لتاريخ في المستقبل</p>
                </div>
                ` : ''}
            </section>

            <!-- Session name -->
            <section class="bg-surface-container rounded-2xl p-5 shadow-sm mb-4 fade-in" style="animation-delay: 0.1s">
                <label class="text-label-bold text-on-surface-variant mb-2 block">اسم الجلسة (اختياري)</label>
                <input type="text" id="sessionNameInput" class="date-input" placeholder="مثال: حلقة تحفيظ صباحية" value="${escapeHtml(sessionName)}"/>
            </section>

            <!-- Stats bar -->
            <section class="bg-surface-container rounded-2xl p-4 shadow-sm mb-4 fade-in" style="animation-delay: 0.15s">
                <div class="grid grid-cols-5 gap-2 text-center">
                    <div>
                        <div class="text-xl font-bold text-success">${stats.present}</div>
                        <div class="text-[10px] text-on-surface-variant font-bold">حاضر</div>
                    </div>
                    <div>
                        <div class="text-xl font-bold text-error">${stats.absent}</div>
                        <div class="text-[10px] text-on-surface-variant font-bold">غائب</div>
                    </div>
                    <div>
                        <div class="text-xl font-bold text-warning">${stats.late}</div>
                        <div class="text-[10px] text-on-surface-variant font-bold">متأخر</div>
                    </div>
                    <div>
                        <div class="text-xl font-bold text-secondary">${stats.excused}</div>
                        <div class="text-[10px] text-on-surface-variant font-bold">بعذر</div>
                    </div>
                    <div>
                        <div class="text-xl font-bold text-on-surface-variant">${stats.unmarked}</div>
                        <div class="text-[10px] text-on-surface-variant font-bold">لم يُسجَّل</div>
                    </div>
                </div>
                <div class="mt-3 pt-3 border-t border-outline-variant flex items-center justify-between">
                    <span class="text-xs text-on-surface-variant font-bold">نسبة الحضور</span>
                    <span class="text-sm font-bold ${stats.pct >= 70 ? 'text-success' : stats.pct >= 40 ? 'text-secondary' : 'text-error'}">${stats.marked > 0 ? stats.pct + '%' : '—'}</span>
                </div>
            </section>

            <!-- Bulk actions -->
            <section class="bg-surface-container rounded-2xl p-4 shadow-sm mb-4 fade-in" style="animation-delay: 0.2s">
                <div class="flex items-center justify-between mb-3">
                    <h4 class="text-label-bold text-on-surface-variant font-bold flex items-center gap-1">
                        <span class="material-symbols-outlined text-base">bolt</span>
                        إجراءات سريعة
                    </h4>
                    <span class="text-xs text-on-surface-variant">${students.length} طالب</span>
                </div>
                <div class="grid grid-cols-4 gap-2">
                    <button class="bulk-action-btn status-btn" data-bulk="present">
                        <span class="material-symbols-outlined">check_circle</span>
                        الكل حاضر
                    </button>
                    <button class="bulk-action-btn status-btn" data-bulk="absent">
                        <span class="material-symbols-outlined">cancel</span>
                        الكل غائب
                    </button>
                    <button class="bulk-action-btn status-btn" data-bulk="reset">
                        <span class="material-symbols-outlined">refresh</span>
                        تصفير
                    </button>
                    <button class="bulk-action-btn status-btn" data-bulk="invert">
                        <span class="material-symbols-outlined">swap_horiz</span>
                        عكس
                    </button>
                </div>
            </section>

            <!-- Students list -->
            <section class="bg-surface-container rounded-2xl shadow-sm mb-4 overflow-hidden fade-in" style="animation-delay: 0.25s">
                <div class="p-4 border-b border-outline-variant flex items-center justify-between sticky top-0 bg-surface-container z-10">
                    <h4 class="text-headline-md text-primary font-bold flex items-center gap-2">
                        <span class="material-symbols-outlined text-secondary">group</span>
                        الطلبة
                    </h4>
                    <span class="text-xs bg-primary/10 text-primary px-2 py-1 rounded-full font-bold">${stats.marked}/${students.length}</span>
                </div>
                <div class="students-scroll divide-y divide-outline-variant max-h-[60vh] overflow-y-auto" id="studentsList">
                    ${renderStudentRows()}
                </div>
            </section>

            <!-- Save button -->
            <section class="sticky bottom-20 md:bottom-4 z-30 fade-in" style="animation-delay: 0.3s">
                <button id="saveBtn" class="w-full ${isEditing ? 'bg-primary' : 'bg-secondary'} text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed" ${stats.marked === 0 ? 'disabled' : ''}>
                    <span class="material-symbols-outlined">${isEditing ? 'save' : 'add_circle'}</span>
                    <span>${isEditing ? 'تحديث سجل الحضور' : 'حفظ سجل الحضور'}</span>
                    <span class="bg-white/20 px-2 py-0.5 rounded-full text-xs">${stats.marked}/${students.length}</span>
                </button>
                ${stats.marked === 0 ? `<p class="text-center text-xs text-on-surface-variant mt-2">قم بتسجيل حالة طالب واحد على الأقل</p>` : ''}
            </section>
        `;

        attachEvents();
    }

    function renderStudentRows() {
        if (students.length === 0) return '';
        return students.map((s, idx) => {
            const st = records[String(s.id)] || '';
            const rowClass = st ? `marked-${st}` : '';
            return `
                <div class="student-row ${rowClass} p-4 bg-white" data-student-id="${s.id}" style="animation: fadeIn 0.3s ease both; animation-delay: ${idx * 20}ms">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-11 h-11 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0">
                            <span class="text-primary font-bold text-sm">${escapeHtml(getInitials(s.name))}</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="text-body-md font-bold text-primary truncate">${escapeHtml(s.name)}</div>
                            <div class="flex items-center gap-2 text-xs text-on-surface-variant mt-0.5">
                                ${s.level ? `<span class="truncate flex items-center gap-1"><span class="material-symbols-outlined text-xs">school</span>${escapeHtml(s.level)}</span>` : ''}
                                ${st ? `<span class="inline-flex items-center gap-1 font-bold ${getStatusColor(st)}">${getStatusIcon(st)} ${getStatusText(st)}</span>` : '<span class="text-on-surface-variant/60">لم يُحدد</span>'}
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-4 gap-2">
                        <button class="status-btn ${st === 'present' ? 'active-present' : ''}" data-student="${s.id}" data-status="present">
                            <span class="material-symbols-outlined">check_circle</span>
                            حاضر
                        </button>
                        <button class="status-btn ${st === 'absent' ? 'active-absent' : ''}" data-student="${s.id}" data-status="absent">
                            <span class="material-symbols-outlined">cancel</span>
                            غائب
                        </button>
                        <button class="status-btn ${st === 'late' ? 'active-late' : ''}" data-student="${s.id}" data-status="late">
                            <span class="material-symbols-outlined">schedule</span>
                            متأخر
                        </button>
                        <button class="status-btn ${st === 'excused' ? 'active-excused' : ''}" data-student="${s.id}" data-status="excused">
                            <span class="material-symbols-outlined">event_available</span>
                            بعذر
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function getStatusColor(st) {
        switch (st) {
            case 'present': return 'text-success';
            case 'absent': return 'text-error';
            case 'late': return 'text-warning';
            case 'excused': return 'text-secondary';
            default: return 'text-on-surface-variant';
        }
    }
    function getStatusIcon(st) {
        const map = { present: 'check_circle', absent: 'cancel', late: 'schedule', excused: 'event_available' };
        return `<span class="material-symbols-outlined text-xs">${map[st] || ''}</span>`;
    }
    function getStatusText(st) {
        const map = { present: 'حاضر', absent: 'غائب', late: 'متأخر', excused: 'بعذر' };
        return map[st] || '';
    }

    function attachEvents() {
        // Date input
        const dateInput = document.getElementById('dateInput');
        dateInput.addEventListener('change', (e) => {
            const newDate = e.target.value;
            if (!newDate) return;
            if (newDate > getTodayISO()) {
                showToast('لا يمكن اختيار تاريخ في المستقبل', 'error');
                dateInput.value = selectedDate;
                return;
            }
            handleDateChange(newDate);
        });

        // Quick date chips
        document.querySelectorAll('.quick-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const d = chip.dataset.date;
                if (d > getTodayISO()) {
                    showToast('لا يمكن اختيار تاريخ في المستقبل', 'error');
                    return;
                }
                handleDateChange(d);
            });
        });

        // Session name
        const sessionInput = document.getElementById('sessionNameInput');
        sessionInput.addEventListener('input', (e) => {
            sessionName = e.target.value;
        });

        // Status buttons
        document.querySelectorAll('.status-btn[data-student]').forEach(btn => {
            btn.addEventListener('click', () => {
                const sid = btn.dataset.student;
                const status = btn.dataset.status;
                const current = records[sid];
                if (current === status) {
                    delete records[sid]; // toggle off
                } else {
                    records[sid] = status;
                }
                renderPage();
            });
        });

        // Bulk actions
        document.querySelectorAll('.bulk-action-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const action = btn.dataset.bulk;
                if (action === 'present') {
                    students.forEach(s => { records[String(s.id)] = 'present'; });
                } else if (action === 'absent') {
                    students.forEach(s => { records[String(s.id)] = 'absent'; });
                } else if (action === 'reset') {
                    records = {};
                } else if (action === 'invert') {
                    students.forEach(s => {
                        const sid = String(s.id);
                        const cur = records[sid];
                        if (cur === 'present') records[sid] = 'absent';
                        else if (cur === 'absent') records[sid] = 'present';
                    });
                }
                renderPage();
            });
        });

        // Save button
        const saveBtn = document.getElementById('saveBtn');
        if (saveBtn) {
            saveBtn.addEventListener('click', handleSaveClick);
        }
    }

    function handleDateChange(newDate) {
        // If there are unsaved changes, warn
        const hasChanges = Object.keys(records).length > 0;
        if (hasChanges && newDate !== selectedDate) {
            openConfirm(
                'تغيير التاريخ',
                'سيتم فقدان التعديلات غير المحفوظة. هل تريد المتابعة؟',
                'warning',
                () => {
                    selectedDate = newDate;
                    loadRecordsForDate(selectedDate);
                    renderPage();
                }
            );
        } else {
            selectedDate = newDate;
            loadRecordsForDate(selectedDate);
            renderPage();
        }
    }

    function handleSaveClick() {
        const stats = computeStats();
        if (stats.marked === 0) {
            showToast('يرجى تسجيل حالة طالب واحد على الأقل', 'error');
            return;
        }
        if (stats.unmarked > 0) {
            openConfirm(
                'حفظ مع طلبة لم يُسجَّلوا',
                `يوجد ${stats.unmarked} طالب لم يتم تحديد حالتهم. سيتم تجاهلهم. هل تريد المتابعة؟`,
                'warning',
                () => performSave()
            );
        } else {
            performSave();
        }
    }

    // ---- Save logic: update existing OR create new, never duplicate ----
    function performSave() {
        // Re-fetch latest attendance to avoid race conditions
        attendance = getAttendance(currentWalletId);

        const existing = findRecordForDate(selectedDate);

        const recordData = {
            date: selectedDate,
            sessionName: sessionName.trim(),
            records: { ...records },
            updatedAt: Date.now()
        };

        let isUpdate = false;

        if (existing) {
            // UPDATE existing record for this date — keep original id/createdAt
            const idx = attendance.findIndex(a => a.date === selectedDate);
            if (idx !== -1) {
                attendance[idx] = {
                    ...attendance[idx],
                    ...recordData,
                    sessionId: attendance[idx].sessionId, // preserve original id
                    createdAt: attendance[idx].createdAt   // preserve original creation date
                };
                isUpdate = true;
            }
        } else {
            // CREATE new record
            attendance.push({
                ...recordData,
                sessionId: Date.now(),
                createdAt: Date.now()
            });
            isUpdate = false;
        }

        saveAttendance(currentWalletId, attendance);
        showToast(isUpdate ? '✓ تم تحديث سجل الحضور' : '✓ تم حفظ سجل الحضور بنجاح', 'success');

        // Reload attendance so editingExistingId reflects new state
        attendance = getAttendance(currentWalletId);

        setTimeout(() => {
            location.href = 'dashboard.html';
        }, 1200);
    }

    // ---- Confirm modal ----
    function openConfirm(title, msg, type, callback) {
        confirmTitle.textContent = title;
        confirmMsg.textContent = msg;
        confirmCallback = callback;
        if (type === 'warning') {
            confirmIcon.className = 'w-16 h-16 bg-warning/10 rounded-full flex items-center justify-center mx-auto mb-4';
            confirmIcon.innerHTML = '<span class="material-symbols-outlined text-warning text-3xl">warning</span>';
            okConfirm.className = 'flex-1 bg-warning text-white py-3 rounded-xl font-bold active:scale-95 transition-transform';
            okConfirm.textContent = 'متابعة';
        } else {
            confirmIcon.className = 'w-16 h-16 bg-secondary/10 rounded-full flex items-center justify-center mx-auto mb-4';
            confirmIcon.innerHTML = '<span class="material-symbols-outlined text-secondary text-3xl">save</span>';
            okConfirm.className = 'flex-1 bg-secondary text-white py-3 rounded-xl font-bold active:scale-95 transition-transform';
            okConfirm.textContent = 'تأكيد';
        }
        confirmModal.classList.remove('hidden');
        confirmModal.classList.add('flex');
    }
    function closeConfirm() {
        confirmModal.classList.add('hidden');
        confirmModal.classList.remove('flex');
        confirmCallback = null;
    }
    cancelConfirm.addEventListener('click', closeConfirm);
    okConfirm.addEventListener('click', () => {
        if (confirmCallback) confirmCallback();
        closeConfirm();
    });
    confirmModal.addEventListener('click', (e) => {
        if (e.target === confirmModal) closeConfirm();
    });

    // ---- Empty states ----
    function renderNoStudents() {
        mainContent.innerHTML = `
            <section class="flex-1 flex items-center justify-center fade-in py-10">
                <div class="bg-surface-container rounded-2xl p-8 shadow-sm text-center max-w-md w-full">
                    <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-secondary/10 mb-4">
                        <span class="material-symbols-outlined text-secondary text-5xl">group_off</span>
                    </div>
                    <h3 class="text-headline-md text-primary font-bold mb-2">لا يوجد طلبة</h3>
                    <p class="text-body-md text-on-surface-variant mb-5">
                        يجب إضافة طلبة أولاً قبل تسجيل الحضور
                    </p>
                    <div class="flex gap-3">
                        <button onclick="location.href='dashboard.html'" class="flex-1 bg-surface text-on-surface py-3 rounded-xl font-bold border border-outline-variant active:scale-95 transition-transform">
                            رجوع
                        </button>
                        <button onclick="location.href='students.html'" class="flex-1 bg-secondary text-white py-3 rounded-xl font-bold shadow-md active:scale-95 transition-transform flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined">person_add</span>
                            إضافة طالب
                        </button>
                    </div>
                </div>
            </section>
        `;
    }

    function renderNoWallet() {
        headerSubtitle.textContent = 'غير مسجل';
        sideName.textContent = '—';
        mainContent.innerHTML = `
            <section class="flex-1 flex items-center justify-center fade-in py-10">
                <div class="bg-surface-container rounded-2xl p-8 shadow-sm text-center max-w-md w-full">
                    <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-error/10 mb-4">
                        <span class="material-symbols-outlined text-error text-5xl">warning</span>
                    </div>
                    <h3 class="text-headline-md text-primary font-bold mb-2">لا يوجد محفظ نشط</h3>
                    <p class="text-body-md text-on-surface-variant mb-5">
                        يرجى تسجيل الدخول كمحفظ أولاً
                    </p>
                    <button onclick="location.href='index.html'" class="bg-secondary text-white px-6 py-3 rounded-xl font-bold shadow-md active:scale-95 transition-transform inline-flex items-center gap-2">
                        <span class="material-symbols-outlined">login</span>
                        تسجيل الدخول
                    </button>
                </div>
            </section>
        `;
    }

    // ESC to close modals
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            if (!confirmModal.classList.contains('hidden')) closeConfirm();
        }
    });

    // Initial render
    render();
})();
</script>
</body>
</html>
