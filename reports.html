}

        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9A23A' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");

    /* Status pills */

    /* Analysis bar */

        display: flex;

        overflow: hidden;
        background: #e2e2e2;

    .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
    }

    @media print {
        .no-print { display: none !important; }
        body { background: #fff; }
    }
</style>

<script>
(function () {
    const WALLETS_KEY = 'masjid_alhadi_wallets';
    const STUDENTS_PREFIX = 'masjid_alhadi_students_';
    const ATTENDANCE_PREFIX = 'masjid_alhadi_attendance_';
    const ACTIVE_WALLET_KEY = 'masjid_alhadi_active_wallet';

    const mainContent = document.getElementById('mainContent');
    const headerSubtitle = document.getElementById('headerSubtitle');
    const sideName = document.getElementById('sideName');

    let currentWalletId = null;
    let currentFilter = 'all';
    let lineChart = null;
    let doughnutChart = null;
    let stackedChart = null;

    // ---- Storage ----
    function getActiveWallet() {
        try {
            const wallets = JSON.parse(localStorage.getItem(WALLETS_KEY) || '[]');
            if (wallets.length === 0) return null;
            const activeId = localStorage.getItem(ACTIVE_WALLET_KEY);
            if (activeId) {
                const found = wallets.find(w => String(w.id) === String(activeId));
                if (found) return found;
            }
            const last = wallets[wallets.length - 1];
            localStorage.setItem(ACTIVE_WALLET_KEY, last.id);
            return last;
        } catch (e) { return null; }
    }
    function getStudents(walletId) {
        try { const raw = localStorage.getItem(STUDENTS_PREFIX + walletId); return raw ? JSON.parse(raw) : []; }
        catch (e) { return []; }
    }
    function getAttendance(walletId) {
        try { const raw = localStorage.getItem(ATTENDANCE_PREFIX + walletId); return raw ? JSON.parse(raw) : []; }
        catch (e) { return []; }
    }
    function getTodayISO() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function formatArabicDate(isoDate) {
        const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
        const days = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
        const d = new Date(isoDate + 'T00:00:00');
        return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    }
    function formatShortDate(isoDate) {
        const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
        const d = new Date(isoDate + 'T00:00:00');
        return `${d.getDate()} ${months[d.getMonth()]}`;
    }
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    function getInitials(name) {
        const parts = (name || '').trim().split(/\s+/);
        if (parts.length >= 2) return parts[0][0] + parts[1][0];
        return parts[0][0] || '?';
    }

    // ---- Filter logic ----
    function filterAttendance(attendance, filter) {
        if (filter === 'all') return attendance;
        const now = new Date();
        const cutoff = new Date();
        if (filter === 'week') cutoff.setDate(now.getDate() - 7);
        else if (filter === 'month') cutoff.setMonth(now.getMonth() - 1);
        const cutoffISO = `${cutoff.getFullYear()}-${String(cutoff.getMonth()+1).padStart(2,'0')}-${String(cutoff.getDate()).padStart(2,'0')}`;
        return attendance.filter(a => a.date >= cutoffISO);
    }

    // Count stats for a single session
    function countSessionStats(records) {
        let present = 0, absent = 0, late = 0, excused = 0;
        if (records) {
            Object.values(records).forEach(status => {
                if (status === 'present') present++;
                else if (status === 'absent') absent++;
                else if (status === 'late') late++;
                else if (status === 'excused') excused++;
            });
        }
        const marked = present + absent + late + excused;
        // Attendance rate: present + late counts as attended
        const attendancePct = marked > 0 ? Math.round(((present + late) / marked) * 100) : 0;
        return { present, absent, late, excused, marked, attendancePct };
    }

    // ---- Compute stats ----
    function computeStats(attendance, students) {
        let totalPresent = 0, totalAbsent = 0, totalLate = 0, totalExcused = 0;
        const totalSessions = attendance.length;
        const studentStats = {};

        students.forEach(s => {
            studentStats[s.id] = { present: 0, absent: 0, late: 0, excused: 0 };
        });

        attendance.forEach(session => {
            if (!session.records) return;
            Object.entries(session.records).forEach(([sid, status]) => {
                if (status === 'present') {
                    totalPresent++;
                    if (studentStats[sid]) studentStats[sid].present++;
                } else if (status === 'absent') {
                    totalAbsent++;
                    if (studentStats[sid]) studentStats[sid].absent++;
                } else if (status === 'late') {
                    totalLate++;
                    if (studentStats[sid]) studentStats[sid].late++;
                } else if (status === 'excused') {
                    totalExcused++;
                    if (studentStats[sid]) studentStats[sid].excused++;
                }
            });
        });

        const totalMarked = totalPresent + totalAbsent + totalLate + totalExcused;
        // Overall attendance rate: present + late counts as attended
        const avgPct = totalMarked > 0 ? Math.round(((totalPresent + totalLate) / totalMarked) * 100) : 0;

        // Best/worst session (based on attendancePct)
        let bestSession = null, worstSession = null;
        let bestPct = -1, worstPct = 101;
        attendance.forEach(session => {
            const s = countSessionStats(session.records);
            if (s.marked > 0) {
                if (s.attendancePct > bestPct) { bestPct = s.attendancePct; bestSession = { ...session, stats: s }; }
                if (s.attendancePct < worstPct) { worstPct = s.attendancePct; worstSession = { ...session, stats: s }; }
            }
        });

        // Top student (by attendance rate)
        let topStudent = null, topPct = -1;
        students.forEach(s => {
            const st = studentStats[s.id];
            const t = st.present + st.absent + st.late + st.excused;
            if (t > 0) {
                const pct = Math.round(((st.present + st.late) / t) * 100);
                if (pct > topPct) { topPct = pct; topStudent = s; }
            }
        });

        // Students with most late arrivals
        let mostLateStudent = null, mostLateCount = 0;
        students.forEach(s => {
            const st = studentStats[s.id];
            if (st.late > mostLateCount) { mostLateCount = st.late; mostLateStudent = s; }
        });

        // Students with most excuses
        let mostExcusedStudent = null, mostExcusedCount = 0;
        students.forEach(s => {
            const st = studentStats[s.id];
            if (st.excused > mostExcusedCount) { mostExcusedCount = st.excused; mostExcusedStudent = s; }
        });

        return {
            totalSessions,
            totalPresent,
            totalAbsent,
            totalLate,
            totalExcused,
            totalMarked,
            avgPct,
            bestSession,
            bestPct,
            worstSession,
            worstPct,
            topStudent,
            topPct,
            mostLateStudent,
            mostLateCount,
            mostExcusedStudent,
            mostExcusedCount,
            studentStats
        };
    }

    // ---- Render ----
    function render() {
        const wallet = getActiveWallet();
        if (!wallet) { renderNoWallet(); return; }

        headerSubtitle.textContent = `محفظ: ${wallet.name}`;
        sideName.textContent = wallet.name;

        const students = getStudents(wallet.id);
        const allAttendance = getAttendance(wallet.id);
        const filtered = filterAttendance(allAttendance, currentFilter);

        if (students.length === 0 || filtered.length === 0) {
            renderEmpty(students.length === 0 ? 'students' : 'attendance');
            return;
        }

        const stats = computeStats(filtered, students);

        mainContent.innerHTML = `
            <!-- Header -->
            <section class="mb-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4 fade-in">
                <div>
                    <h2 class="text-headline-lg text-primary font-bold mb-1">التقارير والتحليلات</h2>
                    <p class="text-body-md text-on-surface-variant">تحليل شامل لحضور وتأخر وغياب الطلبة</p>
                </div>
                <button onclick="exportData()" class="no-print bg-secondary text-white px-5 py-2.5 rounded-xl font-bold shadow-md active:scale-95 transition-transform flex items-center gap-2 self-start">
                    <span class="material-symbols-outlined">download</span>
                    تصدير التقرير
                </button>
            </section>

            <!-- Filter Tabs -->
            <section class="mb-6 fade-in" style="animation-delay: 0.05s">
                <div class="bg-surface-container rounded-2xl p-2 flex gap-2 shadow-sm">
                    <button class="tab-btn flex-1 py-2.5 rounded-xl font-bold text-sm ${currentFilter === 'week' ? 'active' : 'text-on-surface-variant hover:bg-surface'}" data-filter="week">
                        آخر أسبوع
                    </button>
                    <button class="tab-btn flex-1 py-2.5 rounded-xl font-bold text-sm ${currentFilter === 'month' ? 'active' : 'text-on-surface-variant hover:bg-surface'}" data-filter="month">
                        آخر شهر
                    </button>
                    <button class="tab-btn flex-1 py-2.5 rounded-xl font-bold text-sm ${currentFilter === 'all' ? 'active' : 'text-on-surface-variant hover:bg-surface'}" data-filter="all">
                        الكل
                    </button>
                </div>
            </section>

            <!-- Stats Grid (6 cards) -->
            <section class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-6 fade-in" style="animation-delay: 0.1s">
                ${renderStatCard('event_available', 'الجلسات', stats.totalSessions, 'primary', 'bg-primary/10')}
                ${renderStatCard('trending_up', 'نسبة الحضور', stats.avgPct + '%', 'success', 'bg-success/10')}
                ${renderStatCard('how_to_reg', 'حاضر', stats.totalPresent, 'success', 'bg-success/10')}
                ${renderStatCard('schedule', 'متأخر', stats.totalLate, 'warning', 'bg-warning/10')}
                ${renderStatCard('event_busy', 'بعذر', stats.totalExcused, 'secondary', 'bg-secondary/10')}
                ${renderStatCard('person_off', 'غائب', stats.totalAbsent, 'error', 'bg-error/10')}
            </section>

            <!-- Overall Distribution Bar -->
            <section class="mb-6 fade-in" style="animation-delay: 0.13s">
                <div class="bg-surface-container rounded-2xl p-5 shadow-sm">
                    <div class="flex items-center justify-between mb-3">
                        <h4 class="text-headline-md text-primary font-bold flex items-center gap-2">
                            <span class="material-symbols-outlined text-secondary">donut_large</span>
                            توزيع الحالات
                        </h4>
                        <span class="text-xs text-on-surface-variant bg-surface px-2 py-1 rounded-full">${stats.totalMarked} تسجيل</span>
                    </div>
                    ${stats.totalMarked > 0 ? `
                    <div class="analysis-bar mb-3">
                        ${stats.totalPresent > 0 ? `<div class="bg-success" style="width:${(stats.totalPresent/stats.totalMarked)*100}%" title="حاضر"></div>` : ''}
                        ${stats.totalLate > 0 ? `<div class="bg-warning" style="width:${(stats.totalLate/stats.totalMarked)*100}%" title="متأخر"></div>` : ''}
                        ${stats.totalExcused > 0 ? `<div class="bg-secondary" style="width:${(stats.totalExcused/stats.totalMarked)*100}%" title="بعذر"></div>` : ''}
                        ${stats.totalAbsent > 0 ? `<div class="bg-error" style="width:${(stats.totalAbsent/stats.totalMarked)*100}%" title="غائب"></div>` : ''}
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div class="flex items-center gap-2">
                            <span class="legend-dot bg-success"></span>
                            <span class="text-xs text-on-surface-variant">حاضر</span>
                            <span class="text-xs font-bold text-success mr-auto">${stats.totalPresent} (${Math.round((stats.totalPresent/stats.totalMarked)*100)}%)</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="legend-dot bg-warning"></span>
                            <span class="text-xs text-on-surface-variant">متأخر</span>
                            <span class="text-xs font-bold text-warning mr-auto">${stats.totalLate} (${Math.round((stats.totalLate/stats.totalMarked)*100)}%)</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="legend-dot bg-secondary"></span>
                            <span class="text-xs text-on-surface-variant">بعذر</span>
                            <span class="text-xs font-bold text-secondary mr-auto">${stats.totalExcused} (${Math.round((stats.totalExcused/stats.totalMarked)*100)}%)</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="legend-dot bg-error"></span>
                            <span class="text-xs text-on-surface-variant">غائب</span>
                            <span class="text-xs font-bold text-error mr-auto">${stats.totalAbsent} (${Math.round((stats.totalAbsent/stats.totalMarked)*100)}%)</span>
                        </div>
                    </div>
                    <p class="text-[11px] text-on-surface-variant mt-3 text-center bg-surface rounded-lg py-2">
                        <span class="font-bold text-success">المتأخرون يُحتسبون حضوراً</span> في نسبة الحضور • الغائبون بعذر يُسجلون بشكل منفصل
                    </p>

    function renderStatCard(icon, label, value, color, bgClass) {

    function renderSessionsList(attendance, students) {
        if (attendance.length === 0) {
            return `<div class="bg-surface-container rounded-2xl p-5 shadow-sm text-center py-10">
                <span class="material-symbols-outlined text-4xl text-outline-variant">event_busy</span>
                <p class="text-body-md text-on-surface-variant mt-2">لا توجد جلسات</p>
            </div>`;
        }

        const sorted = attendance.slice().sort((a, b) => b.date.localeCompare(a.date));
        const items = sorted.map(s => {
            const stats = countSessionStats(s.records);
            const barColor = stats.attendancePct >= 70 ? 'bg-success' : stats.attendancePct >= 40 ? 'bg-secondary' : 'bg-error';
            return `
                <div class="session-row py-3 border-b border-outline-variant last:border-0">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-11 h-11 rounded-xl bg-primary/10 flex items-center justify-center flex-shrink-0">
                            <span class="material-symbols-outlined text-primary">event</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between mb-1">
                                <div class="text-body-md font-bold text-primary">${formatShortDate(s.date)}</div>
                                <span class="text-sm font-bold ${stats.attendancePct >= 70 ? 'text-success' : stats.attendancePct >= 40 ? 'text-secondary' : 'text-error'}">${stats.attendancePct}%</span>
                            </div>
                            <div class="w-full h-1.5 bg-surface-container-highest rounded-full overflow-hidden">
                                <div class="progress-bar h-full ${barColor} rounded-full" style="width: ${stats.attendancePct}%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-1.5 pr-[52px]">
                        ${stats.present > 0 ? `<span class="status-pill present"><span class="material-symbols-outlined" style="font-size:12px">check_circle</span>${stats.present}</span>` : ''}
                        ${stats.late > 0 ? `<span class="status-pill late"><span class="material-symbols-outlined" style="font-size:12px">schedule</span>${stats.late}</span>` : ''}
                        ${stats.excused > 0 ? `<span class="status-pill excused"><span class="material-symbols-outlined" style="font-size:12px">event_available</span>${stats.excused}</span>` : ''}
                        ${stats.absent > 0 ? `<span class="status-pill absent"><span class="material-symbols-outlined" style="font-size:12px">cancel</span>${stats.absent}</span>` : ''}
                    </div>
                </div>
            `;
        }).join('');

        return `
            <div class="bg-surface-container rounded-2xl p-5 shadow-sm">
                <div class="flex items-center justify-between mb-3">
                    <h4 class="text-headline-md text-primary font-bold flex items-center gap-2">
                        <span class="material-symbols-outlined text-secondary">event_note</span>
                        الجلسات
                    </h4>
                    <span class="text-xs text-on-surface-variant bg-surface px-2 py-1 rounded-full">${attendance.length}</span>
                </div>
                <div class="max-h-96 overflow-y-auto">${items}</div>
            </div>
        `;
    }

    function renderStudentsList(students, studentStats) {
        if (students.length === 0) {
            return `<div class="bg-surface-container rounded-2xl p-5 shadow-sm text-center py-10">
                <span class="material-symbols-outlined text-4xl text-outline-variant">group_off</span>
                <p class="text-body-md text-on-surface-variant mt-2">لا يوجد طلبة</p>
            </div>`;
        }

        // Sort by attendance percentage desc
        const list = students.map(s => {
            const st = studentStats[s.id] || { present: 0, absent: 0, late: 0, excused: 0 };
            const total = st.present + st.absent + st.late + st.excused;
            const pct = total > 0 ? Math.round(((st.present + st.late) / total) * 100) : 0;
            return { student: s, ...st, total, pct };
        }).sort((a, b) => b.pct - a.pct || b.present - a.present);

        const items = list.map((item, idx) => {
            const barColor = item.pct >= 70 ? 'bg-success' : item.pct >= 40 ? 'bg-secondary' : item.total === 0 ? 'bg-outline-variant' : 'bg-error';
            const textColor = item.pct >= 70 ? 'text-success' : item.pct >= 40 ? 'text-secondary' : item.total === 0 ? 'text-on-surface-variant' : 'text-error';
            const medal = idx === 0 && item.total > 0 ? '<span class="material-symbols-outlined text-secondary text-sm">workspace_premium</span>' : '';
            return `
                <div class="student-row py-2.5 border-b border-outline-variant last:border-0">
                    <div class="flex items-center gap-3 mb-1.5">
                        <div class="w-9 h-9 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0">
                            <span class="text-primary font-bold text-xs">${escapeHtml(getInitials(item.student.name))}</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-1.5 mb-1">
                                ${medal}
                                <div class="text-body-md font-semibold text-primary truncate">${escapeHtml(item.student.name)}</div>
                            </div>
                            <div class="flex items-center gap-2">
                                <div class="flex-1 h-1.5 bg-surface-container-highest rounded-full overflow-hidden">
                                    <div class="progress-bar h-full ${barColor} rounded-full" style="width: ${item.pct}%"></div>
                                </div>
                                <span class="text-xs font-bold ${textColor} w-10 text-left">${item.total > 0 ? item.pct + '%' : '—'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-1 pr-[44px]">
                        ${item.present > 0 ? `<span class="status-pill present" style="font-size:10px;padding:1px 6px"><span class="material-symbols-outlined" style="font-size:10px">check_circle</span>${item.present}</span>` : ''}
                        ${item.late > 0 ? `<span class="status-pill late" style="font-size:10px;padding:1px 6px"><span class="material-symbols-outlined" style="font-size:10px">schedule</span>${item.late}</span>` : ''}
                        ${item.excused > 0 ? `<span class="status-pill excused" style="font-size:10px;padding:1px 6px"><span class="material-symbols-outlined" style="font-size:10px">event_available</span>${item.excused}</span>` : ''}
                        ${item.absent > 0 ? `<span class="status-pill absent" style="font-size:10px;padding:1px 6px"><span class="material-symbols-outlined" style="font-size:10px">cancel</span>${item.absent}</span>` : ''}
                        ${item.total === 0 ? `<span class="text-[10px] text-on-surface-variant/60">لا سجلات</span>` : ''}
                    </div>
                </div>
            `;
        }).join('');

        return `
            <div class="bg-surface-container rounded-2xl p-5 shadow-sm">
                <div class="flex items-center justify-between mb-3">
                    <h4 class="text-headline-md text-primary font-bold flex items-center gap-2">
                        <span class="material-symbols-outlined text-secondary">leaderboard</span>
                        ترتيب الطلبة
                    </h4>
                    <span class="text-xs text-on-surface-variant bg-surface px-2 py-1 rounded-full">${students.length}</span>
                </div>
                <div class="max-h-96 overflow-y-auto">${items}</div>
            </div>
        `;
    }

    // ---- Charts ----
    function drawLineChart(attendance, students) {
        const canvas = document.getElementById('attendanceLineChart');
        if (!canvas) return;
        if (lineChart) { lineChart.destroy(); lineChart = null; }

        const sorted = attendance.slice().sort((a, b) => a.date.localeCompare(b.date));
        const labels = sorted.map(s => formatShortDate(s.date));
        const data = sorted.map(s => {
            const st = countSessionStats(s.records);
            return st.attendancePct;
        });

        const ctx = canvas.getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 260);
        gradient.addColorStop(0, 'rgba(30, 125, 69, 0.3)');
        gradient.addColorStop(1, 'rgba(30, 125, 69, 0)');

        lineChart = new Chart(canvas, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'نسبة الحضور %',
                    data: data,
                    borderColor: '#1E7D45',
                    backgroundColor: gradient,
                    borderWidth: 3,
                    fill: true,
                    tension: 0.35,
                    pointBackgroundColor: '#1E7D45',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#0B1D3A',
                        titleFont: { family: 'Cairo', size: 13 },
                        bodyFont: { family: 'Cairo', size: 13, weight: 'bold' },
                        padding: 12,
                        cornerRadius: 10,
                        displayColors: false,
                        callbacks: {
                            label: (ctx) => `نسبة الحضور: ${ctx.parsed.y}%`
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        ticks: {
                            stepSize: 25,
                            callback: (v) => v + '%',
                            font: { family: 'Cairo', size: 11 },
                            color: '#44474d'
                        },
                        grid: { color: 'rgba(0,0,0,0.05)' }
                    },
                    x: {
                        ticks: {
                            font: { family: 'Cairo', size: 11 },
                            color: '#44474d',
                            maxRotation: 45,
                            minRotation: 0
                        },
                        grid: { display: false }
                    }
                }
            }
        });
    }

    function drawDoughnutChart(stats) {
        const canvas = document.getElementById('attendanceDoughnut');
        if (!canvas) return;
        if (doughnutChart) { doughnutChart.destroy(); doughnutChart = null; }

        if (stats.totalMarked === 0) return;

        doughnutChart = new Chart(canvas, {
            type: 'doughnut',
            data: {
                labels: ['حاضر', 'متأخر', 'بعذر', 'غائب'],
                datasets: [{
                    data: [stats.totalPresent, stats.totalLate, stats.totalExcused, stats.totalAbsent],
                    backgroundColor: ['#1E7D45', '#E67E22', '#C9A23A', '#BA1A1A'],
                    borderColor: '#fff',
                    borderWidth: 3,
                    hoverOffset: 8,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '65%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            font: { family: 'Cairo', size: 11, weight: '600' },
                            color: '#44474d',
                            padding: 12,
                            usePointStyle: true,
                            pointStyle: 'circle'
                        }
                    },
                    tooltip: {
                        backgroundColor: '#0B1D3A',
                        titleFont: { family: 'Cairo', size: 13 },
                        bodyFont: { family: 'Cairo', size: 13, weight: 'bold' },
                        padding: 12,
                        cornerRadius: 10,
                        callbacks: {
                            label: (ctx) => {
                                const pct = Math.round((ctx.parsed / stats.totalMarked) * 100);
                                return `${ctx.label}: ${ctx.parsed} (${pct}%)`;
                            }
                        }
                    }
                }
            }
        });
    }

    function drawStackedChart(attendance) {
        const canvas = document.getElementById('stackedChart');
        if (!canvas) return;
        if (stackedChart) { stackedChart.destroy(); stackedChart = null; }

        const sorted = attendance.slice().sort((a, b) => a.date.localeCompare(b.date));
        const labels = sorted.map(s => formatShortDate(s.date));
        const presentData = [], lateData = [], excusedData = [], absentData = [];

        sorted.forEach(s => {
            const st = countSessionStats(s.records);
            presentData.push(st.present);
            lateData.push(st.late);
            excusedData.push(st.excused);
            absentData.push(st.absent);
        });

        stackedChart = new Chart(canvas, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'حاضر',
                        data: presentData,
                        backgroundColor: '#1E7D45',
                        borderRadius: 4,
                    },
                    {
                        label: 'متأخر',
                        data: lateData,
                        backgroundColor: '#E67E22',
                        borderRadius: 4,
                    },
                    {
                        label: 'بعذر',
                        data: excusedData,
                        backgroundColor: '#C9A23A',
                        borderRadius: 4,
                    },
                    {
                        label: 'غائب',
                        data: absentData,
                        backgroundColor: '#BA1A1A',
                        borderRadius: 4,
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            font: { family: 'Cairo', size: 11, weight: '600' },
                            color: '#44474d',
                            padding: 12,
                            usePointStyle: true,
                            pointStyle: 'circle'
                        }
                    },
                    tooltip: {
                        backgroundColor: '#0B1D3A',
                        titleFont: { family: 'Cairo', size: 13 },
                        bodyFont: { family: 'Cairo', size: 12 },
                        padding: 12,
                        cornerRadius: 10,
                    }
                },
                scales: {
                    x: {
                        stacked: true,
                        ticks: {
                            font: { family: 'Cairo', size: 11 },
                            color: '#44474d',
                            maxRotation: 45,
                            minRotation: 0
                        },
                        grid: { display: false }
                    },
                    y: {
                        stacked: true,
                        beginAtZero: true,
                        ticks: {
                            stepSize: 1,
                            font: { family: 'Cairo', size: 11 },
                            color: '#44474d'
                        },
                        grid: { color: 'rgba(0,0,0,0.05)' }
                    }
                }
            }
        });
    }

    // ---- Export ----
    window.exportData = function() {
        const wallet = getActiveWallet();
        if (!wallet) { alert('لا يوجد محفظ نشط'); return; }
        const students = getStudents(wallet.id);
        const attendance = getAttendance(wallet.id);
        if (students.length === 0 || attendance.length === 0) {
            alert('لا توجد بيانات للتصدير');
            return;
        }

        const stats = computeStats(attendance, students);
        let csv = '\uFEFF'; // BOM for Arabic
        csv += `تقرير حضور وتحليلات - مسجد الهادي النبوي\n`;
        csv += `المحفظ: ${wallet.name}\n`;
        csv += `تاريخ التقرير: ${formatArabicDate(getTodayISO())}\n\n`;
        csv += `إحصائيات عامة\n`;
        csv += `إجمالي الجلسات,${stats.totalSessions}\n`;
        csv += `متوسط نسبة الحضور,${stats.avgPct}%\n`;
        csv += `إجمالي الحضور,${stats.totalPresent}\n`;
        csv += `إجمالي المتأخرين,${stats.totalLate}\n`;
        csv += `إجمالي الغياب بعذر,${stats.totalExcused}\n`;
        csv += `إجمالي الغياب,${stats.totalAbsent}\n\n`;

        csv += `تفاصيل الجلسات\n`;
        csv += `التاريخ,حاضر,متأخر,بعذر,غائب,نسبة الحضور\n`;
        attendance.slice().sort((a,b) => b.date.localeCompare(a.date)).forEach(s => {
            const st = countSessionStats(s.records);
            csv += `${s.date},${st.present},${st.late},${st.excused},${st.absent},${st.attendancePct}%\n`;
        });

        csv += `\nتفاصيل الطلبة\n`;
        csv += `الاسم,حاضر,متأخر,بعذر,غائب,النسبة\n`;
        students.forEach(s => {
            const st = stats.studentStats[s.id] || { present: 0, absent: 0, late: 0, excused: 0 };
            const t = st.present + st.absent + st.late + st.excused;
            const pct = t > 0 ? Math.round(((st.present + st.late) / t) * 100) : 0;
            csv += `${s.name},${st.present},${st.late},${st.excused},${st.absent},${pct}%\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `تقرير_حضور_${wallet.name}_${getTodayISO()}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    };

    // ---- Init ----
    const wallet = getActiveWallet();
    if (wallet) currentWalletId = wallet.id;
    render();

    document.addEventListener('visibilitychange', () => { if (!document.hidden) render(); });
    window.addEventListener('storage', () => render());
})();
</script>
</body>
</html>
