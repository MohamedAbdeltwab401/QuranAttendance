<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>إدخال بيانات المحفظ - مسجد الهدي النبوي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
:root{
--primary:#0B1D3A;
--secondary:#C9A23A;
--surface:#F5F6F8;
--surface-variant:#E2E2E2;
--on-surface:#1A1C1C;
--on-surface-variant:#44474D;
--error:#BA1A1A;
--success:#1E7D45;
}
*{box-sizing:border-box;}
body{
margin:0;
font-family:'Cairo', sans-serif;
background:var(--surface);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
min-height:100dvh;
}
.mobile-container{
width:100%;
max-width:420px;
min-height:100vh;
min-height:100dvh;
background:#fff;
box-shadow:0 4px 24px rgba(11,29,58,0.06);
display:flex;
flex-direction:column;
position:relative;
overflow-y:auto;
}
main{
flex-grow:1;
display:flex;
flex-direction:column;
justify-content:center;
padding:32px 20px;
}
.header{ text-align:center; margin-bottom:32px; }
.logo-wrap{
width:120px;
height:120px;
margin:0 auto 16px;
background:#fff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
padding:6px;
box-shadow:0 4px 16px rgba(11,29,58,0.08);
border:1px solid var(--surface-variant);
overflow:hidden;
}
.logo-wrap img{ width:100%; height:100%; object-fit:contain; border-radius:50%; }
h1{
font-size:24px;
font-weight:700;
color:var(--primary);
margin:0 0 8px;
}
.subtitle{
font-size:14px;
color:var(--on-surface-variant);
margin:0;
}
form{ display:flex; flex-direction:column; gap:20px; }
.field-group{ display:flex; flex-direction:column; gap:6px; }
label{
font-size:12px;
font-weight:700;
letter-spacing:0.05em;
color:var(--on-surface);
}
.input-shell{
background:var(--surface);
border:none;
border-bottom:2px solid var(--surface-variant);
border-radius:12px 12px 0 0;
transition:border-color .2s;
display:flex;
align-items:center;
padding:0 16px;
}
.input-shell:focus-within{
border-bottom-color:var(--primary);
}
.input-shell input{
flex:1;
border:none;
background:transparent;
outline:none;
font-family:'Cairo', sans-serif;
font-size:16px;
color:var(--primary);
padding:14px 0;
}
.input-shell input::placeholder{ color:var(--on-surface-variant); }
.input-shell input[type="date"]{
color:var(--primary);
font-family:'Cairo', sans-serif;
}
.icon{
color:var(--on-surface-variant);
font-size:20px;
display:flex;
align-items:center;
}
.error-text{
font-size:12px;
color:var(--error);
min-height:16px;
display:none;
}
.error-text.show{ display:block; }
.input-shell.invalid{ border-bottom-color:var(--error); }
.btn-primary{
margin-top:16px;
width:100%;
background:var(--secondary);
color:#fff;
border:none;
padding:16px;
border-radius:16px;
font-family:'Cairo', sans-serif;
font-size:16px;
font-weight:700;
cursor:pointer;
box-shadow:0 6px 16px rgba(201,162,58,0.35);
transition:transform .12s ease, box-shadow .2s;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}
.btn-primary:active{ transform:scale(0.97); }
.btn-primary:disabled{ opacity:0.7; cursor:not-allowed; }
.spinner{
width:18px; height:18px;
border:2.5px solid rgba(255,255,255,0.4);
border-top-color:#fff;
border-radius:50%;
animation:spin .7s linear infinite;
display:none;
}
.spinner.show{ display:inline-block; }
@keyframes spin{ to{ transform:rotate(360deg); } }
.toast{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%) translateY(20px);
background:var(--primary);
color:#fff;
padding:14px 20px;
border-radius:16px;
font-size:14px;
font-weight:600;
box-shadow:0 8px 24px rgba(0,0,0,0.2);
opacity:0;
pointer-events:none;
transition:opacity .25s, transform .25s;
max-width:90%;
text-align:center;
z-index:999;
}
.toast.error{ background:var(--error); }
.toast.success{ background:var(--success); }
.toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}
.fade-in{
animation:fadeIn .6s ease both;
}
@keyframes fadeIn{
from{ opacity:0; transform:translateY(12px); }
to{ opacity:1; transform:translateY(0); }
}
.saved-list{
margin-top:28px;
border-top:1px solid var(--surface-variant);
padding-top:16px;
}
.saved-list h2{
font-size:14px;
color:var(--on-surface-variant);
font-weight:700;
margin:0 0 10px;
}

/* --- Updated Saved Item Styles --- */
.saved-item{
background:var(--surface);
border:1px solid var(--surface-variant);
border-radius:14px;
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
cursor: pointer;
transition: background .2s, transform .1s;
}
.saved-item:active {
    transform: scale(0.98);
    background: var(--surface-variant);
}
.saved-item:focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
}
.item-content {
    flex: 1;
}
.saved-item .name{ font-weight:700; color:var(--primary); font-size:14px; }
.saved-item .date{ font-size:12px; color:var(--on-surface-variant); margin-top: 4px; }

.delete-btn {
    background: none;
    border: none;
    color: var(--error);
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s;
}
.delete-btn:hover, .delete-btn:focus {
    background: rgba(186, 26, 26, 0.1);
    outline: none;
}

.empty-hint{
font-size:13px;
color:var(--on-surface-variant);
text-align:center;
padding:8px 0;
}
</style>
</head>
<body>
<div class="mobile-container">
<main>
<div class="header fade-in">
<div class="logo-wrap">
<img src="logo.jpg" alt="شعار مسجد الهدي النبوي" />
</div>
<h1>مرحباً بك</h1>
<p class="subtitle">يرجى إدخال بياناتك لبدء استخدام التطبيق</p>
</div>
<form id="walletForm" class="fade-in" novalidate>
<div class="field-group">
<label for="sessionName">اسم المحفظ</label>
<div class="input-shell" id="nameShell">
<input id="sessionName" type="text" placeholder="أدخل اسم المحفظ" autocomplete="off" />
</div>
<span class="error-text" id="nameError">يرجى إدخال اسم المحفظ</span>
</div>
<div class="field-group">
<label for="startDate">تاريخ بداية الدورة</label>
<div class="input-shell" id="dateShell">
<input id="startDate" type="date" />
<span class="icon">📅</span>
</div>
<span class="error-text" id="dateError">يرجى اختيار تاريخ صحيح</span>
</div>
<button type="submit" class="btn-primary" id="saveBtn">
<span class="spinner" id="btnSpinner"></span>
<span id="btnLabel">حفظ وبدء الاستخدام</span>
</button>
</form>
<div class="saved-list fade-in" id="savedList">
<h2>المحفظين السابقين (اضغط للدخول)</h2>
<div id="savedItems"></div>
</div>
</main>
</div>
<div class="toast" id="toast"></div>

<script>
(function () {
    const STORAGE_KEY = 'masjid_alhadi_wallets';
    
    // 1. In-Memory Cache to prevent repetitive localStorage reads/writes
    let wallets = []; 
    
    const form = document.getElementById('walletForm');
    const nameInput = document.getElementById('sessionName');
    const dateInput = document.getElementById('startDate');
    const nameShell = document.getElementById('nameShell');
    const dateShell = document.getElementById('dateShell');
    const nameError = document.getElementById('nameError');
    const dateError = document.getElementById('dateError');
    const saveBtn = document.getElementById('saveBtn');
    const btnSpinner = document.getElementById('btnSpinner');
    const btnLabel = document.getElementById('btnLabel');
    const toast = document.getElementById('toast');
    const savedItemsEl = document.getElementById('savedItems');

    // Load data ONCE on initialization
    function loadWallets() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            wallets = raw ? JSON.parse(raw) : [];
        } catch (e) {
            wallets = [];
        }
    }

    // Sync to localStorage ONLY when data changes
    function syncWallets() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(wallets));
    }

    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;

    function showToast(message, type) {
        toast.textContent = message;
        toast.className = 'toast show' + (type ? ' ' + type : '');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2500);
    }

    // Modern Arabic Date Formatting
    function formatArabicDate(isoDate) {
        try {
            const d = new Date(isoDate + 'T00:00:00');
            return new Intl.DateTimeFormat('ar-EG', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            }).format(d);
        } catch (e) {
            return isoDate;
        }
    }

    function renderWallets() {
        savedItemsEl.innerHTML = '';
        if (wallets.length === 0) {
            savedItemsEl.innerHTML = '<div class="empty-hint">لا توجد محافظ محفوظة بعد</div>';
            return;
        }

        const reversedWallets = [...wallets].reverse();
        
        reversedWallets.forEach((w) => {
            const item = document.createElement('div');
            item.className = 'saved-item';
            item.setAttribute('role', 'button');
            item.setAttribute('tabindex', '0');
            item.dataset.id = w.id;
            
            item.innerHTML = `
                <div class="item-content">
                    <div class="name">${escapeHtml(w.name)}</div>
                    <div class="date">${formatArabicDate(w.startDate)}</div>
                </div>
                <button class="delete-btn" data-id="${w.id}" aria-label="حذف ${escapeHtml(w.name)}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            `;
            savedItemsEl.appendChild(item);
        });
    }

    // Event Delegation for Clicks
    savedItemsEl.addEventListener('click', function(e) {
        // Handle Delete Button
        const deleteBtn = e.target.closest('.delete-btn');
        if (deleteBtn) {
            e.stopPropagation(); // Prevent triggering login
            const id = deleteBtn.getAttribute('data-id');
            deleteWallet(id);
            return;
        }

        // Handle Card Click (Login)
        const item = e.target.closest('.saved-item');
        if (item) {
            const id = item.dataset.id;
            loginWallet(id);
        }
    });

    // Keyboard Accessibility
    savedItemsEl.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
            const item = e.target.closest('.saved-item');
            if (item) {
                e.preventDefault();
                loginWallet(item.dataset.id);
            }
        }
    });

    function loginWallet(id) {
        // Save active wallet context for the dashboard
        localStorage.setItem('activeWalletId', id);
        showToast('جاري تسجيل الدخول...', 'success');
        
        setTimeout(() => {
            // Pass ID via URL param as a fallback/standard routing practice
            window.location.href = `dashboard.html?walletId=${id}`;
        }, 500);
    }

    function deleteWallet(id) {
        wallets = wallets.filter((w) => String(w.id) !== String(id));
        syncWallets(); // Save to localStorage
        renderWallets();
        showToast('تم حذف المحفظ بنجاح', 'success');
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function setInvalid(shell, errorEl, invalid) {
        shell.classList.toggle('invalid', invalid);
        errorEl.classList.toggle('show', invalid);
    }

    form.addEventListener('submit', function (e) {
        e.preventDefault();
        const name = nameInput.value.trim();
        const dateVal = dateInput.value;

        const nameInvalid = name.length === 0;
        const dateInvalid = dateVal.length === 0;

        setInvalid(nameShell, nameError, nameInvalid);
        setInvalid(dateShell, dateError, dateInvalid);

        if (nameInvalid || dateInvalid) {
            showToast('يرجى تعبئة جميع الحقول المطلوبة', 'error');
            return;
        }

        saveBtn.disabled = true;
        btnSpinner.classList.add('show');
        btnLabel.textContent = 'جاري الحفظ...';

        setTimeout(() => {
            // Check if a wallet with the same name already exists (case-insensitive)
            const existingIndex = wallets.findIndex(w => w.name.trim().toLowerCase() === name.toLowerCase());
            let activeId;

            if (existingIndex !== -1) {
                // --- UPDATE EXISTING USER ---
                wallets[existingIndex].startDate = dateVal;
                activeId = wallets[existingIndex].id;
                showToast('تم تحديث بيانات المحفظ بنجاح', 'success');
            } else {
                // --- CREATE NEW USER ---
                const newWallet = {
                    id: Date.now(),
                    name: name,
                    startDate: dateVal
                };
                wallets.push(newWallet);
                activeId = newWallet.id;
                showToast('تم حفظ المحفظ بنجاح', 'success');
            }
            
            syncWallets(); // Save to localStorage
            renderWallets();

            saveBtn.disabled = false;
            btnSpinner.classList.remove('show');
            btnLabel.textContent = 'حفظ وبدء الاستخدام';
            nameInput.value = '';
            dateInput.value = today;

            setInvalid(nameShell, nameError, false);
            setInvalid(dateShell, dateError, false);
            
            // Auto-login to the wallet
            setTimeout(() => {
                loginWallet(activeId);
            }, 900);
        }, 700);
    });

    nameInput.addEventListener('input', () => {
        if (nameInput.value.trim().length > 0) setInvalid(nameShell, nameError, false);
    });

    dateInput.addEventListener('input', () => {
        if (dateInput.value.length > 0) setInvalid(dateShell, dateError, false);
    });

    // Initialize App
    loadWallets();
    renderWallets();
})();
</script>
</body>
</html>
