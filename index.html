<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>إدخال بيانات المحفظ - مسجد الهادي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --primary:#0B1D3A;
    --secondary:#C9A23A;
    --surface:#F5F6F8;
    --surface-variant:#E2E2E2;
    --on-surface:#1A1C1C;
    --on-surface-variant:#44474D;
    --error:#BA1A1A;
    --success:#1E7D45;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Cairo', sans-serif;
    background:var(--surface);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    min-height:100dvh;
  }
  .mobile-container{
    width:100%;
    max-width:420px;
    min-height:100vh;
    min-height:100dvh;
    background:#fff;
    box-shadow:0 4px 24px rgba(11,29,58,0.06);
    display:flex;
    flex-direction:column;
    position:relative;
    overflow-y:auto;
  }
  main{
    flex-grow:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:32px 20px;
  }
  .header{ text-align:center; margin-bottom:32px; }
  .logo-wrap{
    width:120px;
    height:120px;
    margin:0 auto 16px;
    background:#fff;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:6px;
    box-shadow:0 4px 16px rgba(11,29,58,0.08);
    border:1px solid var(--surface-variant);
    overflow:hidden;
  }
  .logo-wrap img{ width:100%; height:100%; object-fit:contain; border-radius:50%; }
  h1{
    font-size:24px;
    font-weight:700;
    color:var(--primary);
    margin:0 0 8px;
  }
  .subtitle{
    font-size:14px;
    color:var(--on-surface-variant);
    margin:0;
  }
  form{ display:flex; flex-direction:column; gap:20px; }
  .field-group{ display:flex; flex-direction:column; gap:6px; }
  label{
    font-size:12px;
    font-weight:700;
    letter-spacing:0.05em;
    color:var(--on-surface);
  }
  .input-shell{
    background:var(--surface);
    border:none;
    border-bottom:2px solid var(--surface-variant);
    border-radius:12px 12px 0 0;
    transition:border-color .2s;
    display:flex;
    align-items:center;
    padding:0 16px;
  }
  .input-shell:focus-within{
    border-bottom-color:var(--primary);
  }
  .input-shell input{
    flex:1;
    border:none;
    background:transparent;
    outline:none;
    font-family:'Cairo', sans-serif;
    font-size:16px;
    color:var(--primary);
    padding:14px 0;
  }
  .input-shell input::placeholder{ color:var(--on-surface-variant); }
  .input-shell input[type="date"]{
    color:var(--primary);
    font-family:'Cairo', sans-serif;
  }
  .icon{
    color:var(--on-surface-variant);
    font-size:20px;
    display:flex;
    align-items:center;
  }
  .error-text{
    font-size:12px;
    color:var(--error);
    min-height:16px;
    display:none;
  }
  .error-text.show{ display:block; }
  .input-shell.invalid{ border-bottom-color:var(--error); }

  .btn-primary{
    margin-top:16px;
    width:100%;
    background:var(--secondary);
    color:#fff;
    border:none;
    padding:16px;
    border-radius:16px;
    font-family:'Cairo', sans-serif;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(201,162,58,0.35);
    transition:transform .12s ease, box-shadow .2s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .btn-primary:active{ transform:scale(0.97); }
  .btn-primary:disabled{ opacity:0.7; cursor:not-allowed; }

  .spinner{
    width:18px; height:18px;
    border:2.5px solid rgba(255,255,255,0.4);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin .7s linear infinite;
    display:none;
  }
  .spinner.show{ display:inline-block; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--primary);
    color:#fff;
    padding:14px 20px;
    border-radius:16px;
    font-size:14px;
    font-weight:600;
    box-shadow:0 8px 24px rgba(0,0,0,0.2);
    opacity:0;
    pointer-events:none;
    transition:opacity .25s, transform .25s;
    max-width:90%;
    text-align:center;
    z-index:999;
  }
  .toast.error{ background:var(--error); }
  .toast.success{ background:var(--success); }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  .fade-in{
    animation:fadeIn .6s ease both;
  }
  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(12px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .saved-list{
    margin-top:28px;
    border-top:1px solid var(--surface-variant);
    padding-top:16px;
  }
  .saved-list h2{
    font-size:14px;
    color:var(--on-surface-variant);
    font-weight:700;
    margin:0 0 10px;
  }
  .saved-item{
    background:var(--surface);
    border:1px solid var(--surface-variant);
    border-radius:14px;
    padding:12px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }
  .saved-item .name{ font-weight:700; color:var(--primary); font-size:14px; }
  .saved-item .date{ font-size:12px; color:var(--on-surface-variant); }
  .saved-item button{
    background:none;
    border:none;
    color:var(--error);
    font-size:12px;
    cursor:pointer;
    font-family:'Cairo', sans-serif;
    font-weight:700;
  }
  .empty-hint{
    font-size:13px;
    color:var(--on-surface-variant);
    text-align:center;
    padding:8px 0;
  }
</style>
</head>

      </div>
      <h1>مرحباً بك</h1>
      <p class="subtitle">يرجى إدخال بياناتك لبدء استخدام التطبيق</p>
    </div>

    <form id="walletForm" class="fade-in" novalidate>
      <div class="field-group">
        <label for="sessionName">اسم المحفظ</label>
        <div class="input-shell" id="nameShell">
          <input id="sessionName" type="text" placeholder="أدخل اسم المحفظ" autocomplete="off" />
        </div>
        <span class="error-text" id="nameError">يرجى إدخال اسم المحفظ</span>
      </div>

      <div class="field-group">
        <label for="startDate">تاريخ بداية الدورة</label>
        <div class="input-shell" id="dateShell">
          <input id="startDate" type="date" />
          <span class="icon">📅</span>
        </div>
        <span class="error-text" id="dateError">يرجى اختيار تاريخ صحيح</span>
      </div>

      <button type="submit" class="btn-primary" id="saveBtn">
        <span class="spinner" id="btnSpinner"></span>
        <span id="btnLabel">حفظ وبدء الاستخدام</span>
      </button>
    </form>

    <div class="saved-list fade-in" id="savedList">
      <h2>المحافظ المحفوظة</h2>
      <div id="savedItems"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  const STORAGE_KEY = 'masjid_alhadi_wallets';

  const form = document.getElementById('walletForm');
  const nameInput = document.getElementById('sessionName');
  const dateInput = document.getElementById('startDate');
  const nameShell = document.getElementById('nameShell');
  const dateShell = document.getElementById('dateShell');
  const nameError = document.getElementById('nameError');
  const dateError = document.getElementById('dateError');
  const saveBtn = document.getElementById('saveBtn');
  const btnSpinner = document.getElementById('btnSpinner');
  const btnLabel = document.getElementById('btnLabel');
  const toast = document.getElementById('toast');
  const savedItemsEl = document.getElementById('savedItems');

  // default date = today
  const today = new Date().toISOString().split('T')[0];
  dateInput.value = today;

  function showToast(message, type) {
    toast.textContent = message;
    toast.className = 'toast show' + (type ? ' ' + type : '');
    setTimeout(() => {
      toast.classList.remove('show');
    }, 2500);
  }

  function getWallets() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function saveWallets(list) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }

  function formatArabicDate(isoDate) {
    const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    const d = new Date(isoDate + 'T00:00:00');
    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  function renderWallets() {
    const wallets = getWallets();
    savedItemsEl.innerHTML = '';

    if (wallets.length === 0) {
      savedItemsEl.innerHTML = '<div class="empty-hint">لا توجد محافظ محفوظة بعد</div>';
      return;
    }

    wallets.slice().reverse().forEach((w) => {
      const item = document.createElement('div');
      item.className = 'saved-item';
      item.innerHTML = `
        <div>
          <div class="name">${escapeHtml(w.name)}</div>
          <div class="date">${formatArabicDate(w.startDate)}</div>
        </div>
        <button data-id="${w.id}">حذف</button>
      `;
      savedItemsEl.appendChild(item);
    });

    savedItemsEl.querySelectorAll('button[data-id]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-id');
        const updated = getWallets().filter((w) => String(w.id) !== String(id));
        saveWallets(updated);
        renderWallets();
        showToast('تم حذف المحفظ', 'success');
      });
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function setInvalid(shell, errorEl, invalid) {
    shell.classList.toggle('invalid', invalid);
    errorEl.classList.toggle('show', invalid);
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    const name = nameInput.value.trim();
    const dateVal = dateInput.value;

    const nameInvalid = name.length === 0;
    const dateInvalid = dateVal.length === 0;

    setInvalid(nameShell, nameError, nameInvalid);
    setInvalid(dateShell, dateError, dateInvalid);

    if (nameInvalid || dateInvalid) {
      showToast('يرجى تعبئة جميع الحقول المطلوبة', 'error');
      return;
    }

    saveBtn.disabled = true;
    btnSpinner.classList.add('show');
    btnLabel.textContent = 'جاري الحفظ...';

    setTimeout(() => {
      const wallets = getWallets();
      wallets.push({
        id: Date.now(),
        name: name,
        startDate: dateVal
      });
      saveWallets(wallets);
      renderWallets();

      saveBtn.disabled = false;
      btnSpinner.classList.remove('show');
      btnLabel.textContent = 'حفظ وبدء الاستخدام';

      nameInput.value = '';
      dateInput.value = today;
      setInvalid(nameShell, nameError, false);
      setInvalid(dateShell, dateError, false);

      showToast('تم حفظ المحفظ بنجاح', 'success');

      setTimeout(function () {
        window.location.href = 'dashboard.html';
      }, 900);
    }, 700);
  });

  nameInput.addEventListener('input', () => {
    if (nameInput.value.trim().length > 0) {
      setInvalid(nameShell, nameError, false);
    }
  });
  dateInput.addEventListener('input', () => {
    if (dateInput.value.length > 0) {
      setInvalid(dateShell, dateError, false);
    }
  });

  renderWallets();
})();
</script>
</body>
</html>
