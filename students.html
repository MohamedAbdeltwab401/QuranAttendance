<head>

<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#0B1D3A",
                    "secondary": "#C9A23A",
                    "surface": "#F5F6F8",
                    "surface-container": "#FFFFFF",
                    "on-surface": "#1a1c1c",
                    "on-surface-variant": "#44474d",
                    "outline-variant": "#e2e2e2",
                    "error": "#BA1A1A",
                    "success": "#1E7D45",
                },
                fontFamily: {
                    "body-md": ["Cairo", "sans-serif"],

                    "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],

<style>
    body { font-family: 'Cairo', sans-serif; }
    .modal-backdrop {
        background: rgba(11, 29, 58, 0.5);
        backdrop-filter: blur(4px);
    }
    .modal-enter { animation: modalIn 0.25s ease-out; }
    @keyframes modalIn {
        from { opacity: 0; transform: translateY(20px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .toast {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #0B1D3A;
        color: #fff;
        padding: 12px 20px;
        border-radius: 16px;
        font-size: 14px;
        font-weight: 600;
        box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        opacity: 0;
        pointer-events: none;
        transition: opacity .25s, transform .25s;
        max-width: 90%;
        text-align: center;
        z-index: 999;
    }
    .toast.error { background: #BA1A1A; }
    .toast.success { background: #1E7D45; }
    .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    .student-item {
        animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
        from { opacity: 0; transform: translateX(10px); }
        to { opacity: 1; transform: translateX(0); }
    }
    .input-shell {
        background: #F5F6F8;
        border: none;
        border-bottom: 2px solid #e2e2e2;
        border-radius: 12px 12px 0 0;
        transition: border-color .2s;
        display: flex;
        align-items: center;
        padding: 0 16px;
    }
    .input-shell:focus-within {
        border-bottom-color: #0B1D3A;
    }
    .input-shell.invalid {
        border-bottom-color: #BA1A1A;
    }
    .input-shell input, .input-shell textarea {
        flex: 1;
        border: none;
        background: transparent;
        outline: none;
        font-family: 'Cairo', sans-serif;
        font-size: 15px;
        color: #0B1D3A;
        padding: 14px 0;
        resize: none;
    }
    .input-shell input::placeholder, .input-shell textarea::placeholder { color: #44474d; }
    .error-text {
        font-size: 12px;
        color: #BA1A1A;
        min-height: 16px;
        display: none;
    }
    .error-text.show { display: block; }
    .menu-popup {
        position: absolute;
        left: 8px;
        top: 100%;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        min-width: 140px;
        z-index: 50;
        overflow: hidden;
        animation: menuIn 0.15s ease-out;
    }
    @keyframes menuIn {
        from { opacity: 0; transform: translateY(-5px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .menu-popup button {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 12px 16px;
        text-align: right;
        font-family: 'Cairo', sans-serif;
        font-size: 14px;
        font-weight: 600;
        color: #1a1c1c;
        background: transparent;
        border: none;
        cursor: pointer;
    }
    .menu-popup button:hover { background: #F5F6F8; }
    .menu-popup button.danger { color: #BA1A1A; }

    /* History modal specifics */
    .history-row {
        animation: rowIn 0.25s ease-out backwards;
    }
    @keyframes rowIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .stat-card {
        background: linear-gradient(135deg, #0B1D3A 0%, #1a3560 100%);
        color: #fff;
    }
    .progress-ring {
        transform: rotate(-90deg);
    }
    .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
    }
    .status-present { background: #1E7D45; box-shadow: 0 0 0 3px rgba(30,125,69,0.15); }
    .status-absent { background: #BA1A1A; box-shadow: 0 0 0 3px rgba(186,26,26,0.15); }
    .status-excused { background: #C9A23A; box-shadow: 0 0 0 3px rgba(201,162,58,0.2); }
    .status-late { background: #E67E22; box-shadow: 0 0 0 3px rgba(230,126,34,0.2); }

    .filter-chip {
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        background: #F5F6F8;
        color: #44474d;
        border: 1px solid transparent;
        cursor: pointer;
        transition: all .2s;
        white-space: nowrap;
    }
    .filter-chip.active {
        background: #0B1D3A;
        color: #fff;
    }
    .filter-chip:hover:not(.active) {
        background: #e8eaed;
    }

    /* Scrollbar */
    .history-scroll::-webkit-scrollbar { width: 6px; }
    .history-scroll::-webkit-scrollbar-track { background: transparent; }
    .history-scroll::-webkit-scrollbar-thumb { background: #e2e2e2; border-radius: 3px; }
    .history-scroll::-webkit-scrollbar-thumb:hover { background: #c5c5c5; }
</style>

<script>
(function () {
    const WALLETS_KEY = 'masjid_alhadi_wallets';
    const STUDENTS_PREFIX = 'masjid_alhadi_students_';
    const ATTENDANCE_PREFIX = 'masjid_alhadi_attendance_';
    const SESSIONS_PREFIX = 'masjid_alhadi_sessions_';
    const ACTIVE_WALLET_KEY = 'masjid_alhadi_active_wallet';

    // Elements
    const walletLabel = document.getElementById('walletLabel');
    const countBadge = document.getElementById('countBadge');
    const searchInput = document.getElementById('searchInput');
    const clearSearch = document.getElementById('clearSearch');
    const addBtn = document.getElementById('addBtn');
    const studentsList = document.getElementById('studentsList');
    const studentModal = document.getElementById('studentModal');
    const modalTitle = document.getElementById('modalTitle');
    const closeModal = document.getElementById('closeModal');
    const studentForm = document.getElementById('studentForm');
    const cancelBtn = document.getElementById('cancelBtn');
    const saveSpinner = document.getElementById('saveSpinner');
    const saveLabel = document.getElementById('saveLabel');
    const studentName = document.getElementById('studentName');

    const nameShell = document.getElementById('nameShell');
    const nameError = document.getElementById('nameError');
    const deleteModal = document.getElementById('deleteModal');
    const deleteMsg = document.getElementById('deleteMsg');
    const cancelDelete = document.getElementById('cancelDelete');
    const confirmDelete = document.getElementById('confirmDelete');
    const toast = document.getElementById('toast');

    // History modal elements
    const historyModal = document.getElementById('historyModal');
    const closeHistory = document.getElementById('closeHistory');
    const historyStudentName = document.getElementById('historyStudentName');
    const historyStudentMeta = document.getElementById('historyStudentMeta');
    const historyAvatar = document.getElementById('historyAvatar');
    const historyList = document.getElementById('historyList');
    const statTotal = document.getElementById('statTotal');
    const statPresent = document.getElementById('statPresent');
    const statAbsent = document.getElementById('statAbsent');
    const statRate = document.getElementById('statRate');
    const progressBar = document.getElementById('progressBar');
    const filterChips = document.getElementById('filterChips');

    let currentWalletId = null;
    let editingStudentId = null;
    let deletingStudentId = null;
    let viewingStudentId = null;
    let currentFilter = 'all';

    // ---- Storage helpers ----
    function getActiveWallet() {
        try {
            const wallets = JSON.parse(localStorage.getItem(WALLETS_KEY) || '[]');
            if (wallets.length === 0) return null;
            const activeId = localStorage.getItem(ACTIVE_WALLET_KEY);
            if (activeId) {
                const found = wallets.find(w => String(w.id) === String(activeId));
                if (found) return found;
            }
            const last = wallets[wallets.length - 1];
            localStorage.setItem(ACTIVE_WALLET_KEY, last.id);
            return last;
        } catch (e) { return null; }
    }

    function getStudents(walletId) {
        try {
            const raw = localStorage.getItem(STUDENTS_PREFIX + walletId);
            return raw ? JSON.parse(raw) : [];
        } catch (e) { return []; }
    }

    function saveStudents(walletId, list) {
        localStorage.setItem(STUDENTS_PREFIX + walletId, JSON.stringify(list));
    }

    // Get attendance records for a wallet
    // Expected structure: array of { date: 'YYYY-MM-DD', sessionId: id, records: { [studentId]: 'present'|'absent'|'excused'|'late' } }
    function getAttendance(walletId) {
        try {
            const raw = localStorage.getItem(ATTENDANCE_PREFIX + walletId);
            return raw ? JSON.parse(raw) : [];
        } catch (e) { return []; }
    }

    // Get sessions info (optional, for richer display)
    function getSessions(walletId) {
        try {
            const raw = localStorage.getItem(SESSIONS_PREFIX + walletId);
            return raw ? JSON.parse(raw) : [];
        } catch (e) { return []; }
    }

    // Build student attendance history
    function getStudentHistory(walletId, studentId) {
        const attendance = getAttendance(walletId);
        const sessions = getSessions(walletId);
        const sessionMap = {};
        sessions.forEach(s => { sessionMap[String(s.id)] = s; });

        const history = [];
        attendance.forEach(rec => {
            const status = rec.records && rec.records[String(studentId)];
            if (status) {
                const session = sessionMap[String(rec.sessionId)];
                history.push({
                    date: rec.date,
                    sessionId: rec.sessionId,
                    sessionName: session ? (session.name || session.title) : null,
                    status: status
                });
            }
        });

        // Sort by date descending (most recent first)
        history.sort((a, b) => {
            if (a.date !== b.date) return b.date.localeCompare(a.date);
            return (b.sessionId || 0) - (a.sessionId || 0);
        });

        return history;
    }

    // ---- Toast ----
    function showToast(message, type) {
        toast.textContent = message;
        toast.className = 'toast show' + (type ? ' ' + type : '');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ---- Escape HTML ----
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ---- Get initials for avatar ----
    function getInitials(name) {
        const parts = name.trim().split(/\s+/);
        if (parts.length >= 2) return parts[0][0] + parts[1][0];
        return parts[0][0] || '?';
    }

    // ---- Format date ----
    function formatDate(dateStr) {
        if (!dateStr) return '';
        try {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            const days = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
            const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
            return `${days[d.getDay()]}، ${d.getDate()} ${months[d.getMonth()]}`;
        } catch (e) { return dateStr; }
    }

    function formatDateShort(dateStr) {
        if (!dateStr) return '';
        try {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
        } catch (e) { return dateStr; }
    }

    // ---- Status helpers ----
    function getStatusInfo(status) {
        switch (status) {
            case 'present': return { label: 'حاضر', color: 'text-success', bg: 'bg-success/10', icon: 'check_circle', dot: 'status-present' };
            case 'absent': return { label: 'غائب', color: 'text-error', bg: 'bg-error/10', icon: 'cancel', dot: 'status-absent' };
            case 'excused': return { label: 'غائب بعذر', color: 'text-secondary', bg: 'bg-secondary/10', icon: 'event_available', dot: 'status-excused' };
            case 'late': return { label: 'متأخر', color: 'text-orange-500', bg: 'bg-orange-50', icon: 'schedule', dot: 'status-late' };
            default: return { label: status, color: 'text-on-surface-variant', bg: 'bg-surface', icon: 'help', dot: '' };
        }
    }

    // ---- Render students ----
    function renderStudents() {
        if (!currentWalletId) {
            studentsList.innerHTML = `
                <div class="p-8 text-center">
                    <div class="w-16 h-16 bg-error/10 rounded-full flex items-center justify-center mx-auto mb-3">
                        <span class="material-symbols-outlined text-error text-3xl">warning</span>
                    </div>
                    <h3 class="text-headline-md font-headline-md text-primary mb-2">لا يوجد محفظ نشط</h3>
                    <p class="text-body-md text-on-surface-variant mb-4">يرجى تسجيل الدخول كمحفظ أولاً</p>
                    <a href="index.html" class="inline-block bg-secondary text-white px-6 py-2 rounded-xl font-headline-md">الذهاب للتسجيل</a>
                </div>`;
            countBadge.textContent = '0';
            return;
        }

        const students = getStudents(currentWalletId);
        const query = searchInput.value.trim().toLowerCase();
        const filtered = query
            ? students.filter(s =>
                s.name.toLowerCase().includes(query) ||
                (s.phone && s.phone.includes(query)) ||
                (s.level && s.level.toLowerCase().includes(query)))
            : students;

        countBadge.textContent = students.length;

        if (students.length === 0) {
            studentsList.innerHTML = `
                <div class="p-8 text-center">
                    <div class="w-20 h-20 bg-secondary/10 rounded-full flex items-center justify-center mx-auto mb-4">
                        <span class="material-symbols-outlined text-secondary text-4xl">person_add</span>
                    </div>
                    <h3 class="text-headline-md font-headline-md text-primary mb-2">لا يوجد طلبة بعد</h3>
                    <p class="text-body-md text-on-surface-variant">ابدأ بإضافة طالبك الأول</p>
                </div>`;
            return;
        }

        if (filtered.length === 0) {
            studentsList.innerHTML = `
                <div class="p-8 text-center">
                    <div class="w-16 h-16 bg-surface rounded-full flex items-center justify-center mx-auto mb-3">
                        <span class="material-symbols-outlined text-on-surface-variant text-3xl">search_off</span>
                    </div>
                    <h3 class="text-headline-md font-headline-md text-primary mb-2">لا توجد نتائج</h3>
                    <p class="text-body-md text-on-surface-variant">جرّب كلمة بحث مختلفة</p>
                </div>`;
            return;
        }

        // Precompute attendance summary per student for quick badge
        const attendance = getAttendance(currentWalletId);
        const summaryMap = {};
        attendance.forEach(rec => {
            Object.keys(rec.records || {}).forEach(sid => {
                if (!summaryMap[sid]) summaryMap[sid] = { total: 0, present: 0 };
                summaryMap[sid].total++;
                if (rec.records[sid] === 'present' || rec.records[sid] === 'late') {
                    summaryMap[sid].present++;
                }
            });
        });

        studentsList.innerHTML = filtered.map(s => {
            const summary = summaryMap[String(s.id)] || { total: 0, present: 0 };
            const rate = summary.total > 0 ? Math.round((summary.present / summary.total) * 100) : null;
            return `
            <div class="student-item flex items-center justify-between p-4 bg-white hover:bg-surface transition-colors cursor-pointer border-b border-outline-variant last:border-0 relative" data-id="${s.id}">
                <div class="flex items-center gap-3 flex-1 min-w-0 student-row" data-id="${s.id}">
                    <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0">
                        <span class="text-primary font-bold text-sm">${escapeHtml(getInitials(s.name))}</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-body-md font-semibold text-primary truncate">${escapeHtml(s.name)}</div>
                        <div class="flex items-center gap-2 text-xs text-on-surface-variant mt-0.5">
                            ${s.level ? `<span class="truncate"><span class="material-symbols-outlined text-xs align-middle">school</span> ${escapeHtml(s.level)}</span>` : ''}
                            ${s.phone ? `<span class="truncate"><span class="material-symbols-outlined text-xs align-middle">phone</span> ${escapeHtml(s.phone)}</span>` : ''}
                            ${rate !== null ? `<span class="inline-flex items-center gap-1 text-success font-bold"><span class="material-symbols-outlined text-xs">trending_up</span>${rate}%</span>` : '<span class="text-on-surface-variant/60">لا سجلات</span>'}
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-1">
                    <button class="history-btn text-primary hover:text-secondary p-2 rounded-full hover:bg-primary/5 transition-colors" data-id="${s.id}" title="سجل الحضور">
                        <span class="material-symbols-outlined">history</span>
                    </button>
                    <button class="delete-btn text-error hover:text-error/80 p-2 rounded-full hover:bg-error/10 transition-colors" data-id="${s.id}" title="حذف الطالب">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                </div>
            </div>
        `}).join('');

        // Attach handlers
        studentsList.querySelectorAll('.student-row').forEach(row => {
            row.addEventListener('click', (e) => {
                const id = row.getAttribute('data-id');
                openHistoryModal(id);
            });
        });
        studentsList.querySelectorAll('.history-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                openHistoryModal(id);
            });
        });
        studentsList.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                openDeleteModal(id);
            });
        });
    }

    // ---- History modal ----
    function openHistoryModal(studentId) {
        const students = getStudents(currentWalletId);
        const student = students.find(s => String(s.id) === String(studentId));
        if (!student) return;

        viewingStudentId = studentId;
        currentFilter = 'all';
        // Reset filter chips
        filterChips.querySelectorAll('.filter-chip').forEach(c => {
            c.classList.toggle('active', c.dataset.filter === 'all');
        });

        // Header info
        historyStudentName.textContent = student.name;
        const metaParts = [];
        if (student.level) metaParts.push(student.level);
        if (student.phone) metaParts.push(student.phone);
        historyStudentMeta.textContent = metaParts.length ? metaParts.join(' • ') : 'طالب';
        historyAvatar.innerHTML = `<span class="text-white font-bold">${escapeHtml(getInitials(student.name))}</span>`;

        renderHistory();

        historyModal.classList.remove('hidden');
        historyModal.classList.add('flex');
    }

    function closeHistoryModal() {
        historyModal.classList.add('hidden');
        historyModal.classList.remove('flex');
        viewingStudentId = null;
    }

    function renderHistory() {
        if (!viewingStudentId || !currentWalletId) return;

        const history = getStudentHistory(currentWalletId, viewingStudentId);
        const filtered = currentFilter === 'all'
            ? history
            : history.filter(h => h.status === currentFilter);

        // Compute stats from full history
        const total = history.length;
        const present = history.filter(h => h.status === 'present' || h.status === 'late').length;
        const absent = history.filter(h => h.status === 'absent').length;
        const rate = total > 0 ? Math.round((present / total) * 100) : 0;

        statTotal.textContent = total;
        statPresent.textContent = present;
        statAbsent.textContent = absent;
        statRate.textContent = rate + '%';
        progressBar.style.width = rate + '%';

        if (total === 0) {
            historyList.innerHTML = `
                <div class="py-10 text-center">
                    <div class="w-16 h-16 bg-surface rounded-full flex items-center justify-center mx-auto mb-3">
                        <span class="material-symbols-outlined text-on-surface-variant text-3xl">event_busy</span>
                    </div>
                    <h3 class="text-headline-md font-headline-md text-primary mb-1">لا يوجد سجل حضور</h3>
                    <p class="text-body-md text-on-surface-variant">لم يتم تسجيل حضور هذا الطالب بعد</p>
                </div>`;
            return;
        }

        if (filtered.length === 0) {
            historyList.innerHTML = `
                <div class="py-10 text-center">
                    <div class="w-14 h-14 bg-surface rounded-full flex items-center justify-center mx-auto mb-3">
                        <span class="material-symbols-outlined text-on-surface-variant text-2xl">filter_alt_off</span>
                    </div>
                    <p class="text-body-md text-on-surface-variant">لا توجد سجلات بهذا التصنيف</p>
                </div>`;
            return;
        }

        // Group by month
        const groups = {};
        filtered.forEach(h => {
            try {
                const d = new Date(h.date);
                const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
                const label = `${months[d.getMonth()]} ${d.getFullYear()}`;
                if (!groups[key]) groups[key] = { label, items: [] };
                groups[key].items.push(h);
            } catch (e) {
                if (!groups['_other']) groups['_other'] = { label: 'أخرى', items: [] };
                groups['_other'].items.push(h);
            }
        });

        const sortedKeys = Object.keys(groups).sort().reverse();

        historyList.innerHTML = sortedKeys.map((key, gi) => {
            const g = groups[key];
            const rows = g.items.map((h, i) => {
                const info = getStatusInfo(h.status);
                return `
                    <div class="history-row flex items-center gap-3 p-3 bg-white rounded-xl border border-outline-variant/60 hover:border-primary/20 transition-colors" style="animation-delay:${(gi*50 + i*30)}ms">
                        <div class="w-10 h-10 rounded-full ${info.bg} flex items-center justify-center flex-shrink-0">
                            <span class="material-symbols-outlined ${info.color} text-xl">${info.icon}</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="text-sm font-bold text-primary">${formatDate(h.date)}</div>
                            <div class="text-xs text-on-surface-variant truncate mt-0.5">
                                ${h.sessionName ? escapeHtml(h.sessionName) : `جلسة #${h.sessionId || '—'}`}
                            </div>
                        </div>
                        <div class="text-left flex-shrink-0">
                            <div class="inline-flex items-center gap-1 px-2 py-1 rounded-full ${info.bg} ${info.color} text-xs font-bold">
                                <span class="status-dot ${info.dot}"></span>
                                ${info.label}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <div class="mb-4">
                    <div class="flex items-center gap-2 mb-2 px-1">
                        <span class="material-symbols-outlined text-on-surface-variant text-base">calendar_month</span>
                        <h4 class="text-label-bold text-on-surface-variant font-bold">${g.label}</h4>
                        <span class="text-[10px] bg-surface text-on-surface-variant px-2 py-0.5 rounded-full font-bold">${g.items.length}</span>
                    </div>
                    <div class="flex flex-col gap-2">
                        ${rows}
                    </div>
                </div>
            `;
        }).join('');
    }

    // Filter chips handlers
    filterChips.addEventListener('click', (e) => {
        const chip = e.target.closest('.filter-chip');
        if (!chip) return;
        filterChips.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentFilter = chip.dataset.filter;
        renderHistory();
    });

    // ---- Modal handlers ----
    function openAddModal() {
        editingStudentId = null;
        modalTitle.textContent = 'إضافة طالب';
        saveLabel.textContent = 'حفظ';
        studentForm.reset();
        nameShell.classList.remove('invalid');
        nameError.classList.remove('show');
        studentModal.classList.remove('hidden');
        studentModal.classList.add('flex');
        setTimeout(() => studentName.focus(), 100);
    }

    function closeStudentModal() {
        studentModal.classList.add('hidden');
        studentModal.classList.remove('flex');
        editingStudentId = null;
    }

    function openDeleteModal(id) {
        const students = getStudents(currentWalletId);
        const student = students.find(s => String(s.id) === String(id));
        if (!student) return;
        deletingStudentId = id;
        deleteMsg.textContent = `هل أنت متأكد من حذف الطالب "${student.name}"؟`;
        deleteModal.classList.remove('hidden');
        deleteModal.classList.add('flex');
    }

    function closeDeleteModal() {
        deleteModal.classList.add('hidden');
        deleteModal.classList.remove('flex');
        deletingStudentId = null;
    }

    // ---- Form submit ----
    studentForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = studentName.value.trim();
        if (name.length === 0) {
            nameShell.classList.add('invalid');
            nameError.classList.add('show');
            return;
        }

        saveSpinner.classList.remove('hidden');
        saveLabel.textContent = editingStudentId ? 'جاري التحديث...' : 'جاري الحفظ...';

        setTimeout(() => {
            const students = getStudents(currentWalletId);
            const data = { name: name };

            if (editingStudentId) {
                const idx = students.findIndex(s => String(s.id) === String(editingStudentId));
                if (idx !== -1) {
                    students[idx] = { ...students[idx], ...data, updatedAt: Date.now() };
                }
                showToast('تم تحديث بيانات الطالب', 'success');
            } else {
                students.push({
                    id: Date.now(),
                    ...data,
                    createdAt: Date.now()
                });
                showToast('تمت إضافة الطالب بنجاح', 'success');
            }

            saveStudents(currentWalletId, students);
            renderStudents();
            saveSpinner.classList.add('hidden');
            saveLabel.textContent = 'حفظ';
            closeStudentModal();
        }, 400);
    });

    studentName.addEventListener('input', () => {
        if (studentName.value.trim().length > 0) {
            nameShell.classList.remove('invalid');
            nameError.classList.remove('show');
        }
    });

    // ---- Delete confirm ----
    confirmDelete.addEventListener('click', () => {
        if (!deletingStudentId) return;
        const students = getStudents(currentWalletId).filter(s => String(s.id) !== String(deletingStudentId));
        saveStudents(currentWalletId, students);
        renderStudents();
        closeDeleteModal();
        showToast('تم حذف الطالب', 'success');
    });

    // ---- Event listeners ----
    addBtn.addEventListener('click', openAddModal);
    closeModal.addEventListener('click', closeStudentModal);
    cancelBtn.addEventListener('click', closeStudentModal);
    cancelDelete.addEventListener('click', closeDeleteModal);
    closeHistory.addEventListener('click', closeHistoryModal);

    studentModal.addEventListener('click', (e) => {
        if (e.target === studentModal) closeStudentModal();
    });
    deleteModal.addEventListener('click', (e) => {
        if (e.target === deleteModal) closeDeleteModal();
    });
    historyModal.addEventListener('click', (e) => {
        if (e.target === historyModal) closeHistoryModal();
    });

    // ESC to close modals
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            if (!historyModal.classList.contains('hidden')) closeHistoryModal();
            else if (!deleteModal.classList.contains('hidden')) closeDeleteModal();
            else if (!studentModal.classList.contains('hidden')) closeStudentModal();
        }
    });

    searchInput.addEventListener('input', () => {
        clearSearch.classList.toggle('hidden', searchInput.value.length === 0);
        renderStudents();
    });
    clearSearch.addEventListener('click', () => {
        searchInput.value = '';
        clearSearch.classList.add('hidden');
        renderStudents();
    });

    // ---- Init ----
    const wallet = getActiveWallet();
    if (wallet) {
        currentWalletId = wallet.id;
        walletLabel.textContent = `محفظ: ${wallet.name}`;
    }
    renderStudents();
})();
</script>
</body>
</html>
